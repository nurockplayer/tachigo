services:
  app:
    image: tachigo-app:latest
    build: ./services/api
    ports:
      - "8080:8080"
    env_file:
      - path: ./services/api/.env
        required: false
    environment:
      DATABASE_URL: host=postgres user=postgres password=postgres dbname=tachigo port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tachigo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./apps/extension
    ports:
      - "5173:5173"
    env_file:
      - path: ./apps/extension/.env
        required: false
    volumes:
      - ./apps/extension/src:/app/src
      - ./apps/extension/public:/app/public
      - ./apps/extension/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - app
    restart: unless-stopped

  dashboard:
    build: ./apps/dashboard
    ports:
      - "5174:5174"
    env_file:
      - path: ./apps/dashboard/.env
        required: false
    volumes:
      - ./apps/dashboard/src:/app/src
      - ./apps/dashboard/public:/app/public
      - ./apps/dashboard/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
