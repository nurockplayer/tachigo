basePath: /api/v1
definitions:
  github_com_tachigo_tachigo_internal_models.AuthProvider:
    properties:
      created_at:
        type: string
      id:
        type: string
      metadata:
        type: object
      provider:
        $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.ProviderType'
      provider_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  github_com_tachigo_tachigo_internal_models.ProviderType:
    enum:
    - twitch
    - google
    - web3
    - email
    type: string
    x-enum-varnames:
    - ProviderTwitch
    - ProviderGoogle
    - ProviderWeb3
    - ProviderEmail
  github_com_tachigo_tachigo_internal_models.ShippingAddress:
    properties:
      address_line1:
        type: string
      address_line2:
        type: string
      city:
        type: string
      country:
        type: string
      created_at:
        type: string
      district:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      phone:
        type: string
      postal_code:
        type: string
      recipient_name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  github_com_tachigo_tachigo_internal_models.User:
    properties:
      addresses:
        items:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.ShippingAddress'
        type: array
      auth_providers:
        items:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.AuthProvider'
        type: array
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      id:
        type: string
      is_active:
        type: boolean
      role:
        $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.UserRole'
      updated_at:
        type: string
      username:
        type: string
    type: object
  github_com_tachigo_tachigo_internal_models.UserRole:
    enum:
    - viewer
    - streamer
    - agency
    - admin
    type: string
    x-enum-varnames:
    - RoleViewer
    - RoleStreamer
    - RoleAgency
    - RoleAdmin
  github_com_tachigo_tachigo_internal_services.AddressInput:
    properties:
      address_line1:
        type: string
      address_line2:
        type: string
      city:
        type: string
      country:
        type: string
      district:
        type: string
      is_default:
        type: boolean
      phone:
        type: string
      postal_code:
        type: string
      recipient_name:
        type: string
    required:
    - address_line1
    - city
    - recipient_name
    type: object
  github_com_tachigo_tachigo_internal_services.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_tachigo_tachigo_internal_services.RegisterInput:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  github_com_tachigo_tachigo_internal_services.TokenPair:
    properties:
      access_token:
        type: string
      expires_in:
        description: seconds
        type: integer
      refresh_token:
        type: string
    type: object
  github_com_tachigo_tachigo_internal_services.UpdateProfileInput:
    properties:
      avatar_url:
        type: string
      username:
        type: string
    type: object
  github_com_tachigo_tachigo_internal_services.Web3VerifyInput:
    properties:
      address:
        type: string
      nonce:
        type: string
      signature:
        type: string
    required:
    - address
    - nonce
    - signature
    type: object
  internal_handlers.AddressResponse:
    properties:
      address:
        $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.ShippingAddress'
    type: object
  internal_handlers.AddressesResponse:
    properties:
      addresses:
        items:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.ShippingAddress'
        type: array
    type: object
  internal_handlers.AuthResponse:
    properties:
      tokens:
        $ref: '#/definitions/github_com_tachigo_tachigo_internal_services.TokenPair'
      user:
        $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.User'
    type: object
  internal_handlers.MessageResponse:
    properties:
      message:
        type: string
    type: object
  internal_handlers.NonceResponse:
    properties:
      issued_at:
        type: string
      nonce:
        type: string
    type: object
  internal_handlers.PointsBalanceResponse:
    properties:
      cumulative_total:
        type: integer
      spendable_balance:
        type: integer
    type: object
  internal_handlers.PointsHistoryItem:
    properties:
      amount:
        type: integer
      created_at:
        format: date-time
        type: string
      note:
        type: string
      sku:
        type: string
      type:
        enum:
        - earn
        - spend
        type: string
    type: object
  internal_handlers.PointsHistoryResponse:
    properties:
      transactions:
        items:
          $ref: '#/definitions/internal_handlers.PointsHistoryItem'
        type: array
    type: object
  internal_handlers.ProvidersResponse:
    properties:
      providers:
        items:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.AuthProvider'
        type: array
    type: object
  internal_handlers.Response:
    properties:
      data: {}
      error:
        type: string
      success:
        type: boolean
    type: object
  internal_handlers.TokensResponse:
    properties:
      tokens:
        $ref: '#/definitions/github_com_tachigo_tachigo_internal_services.TokenPair'
    type: object
  internal_handlers.UserResponse:
    properties:
      user:
        $ref: '#/definitions/github_com_tachigo_tachigo_internal_models.User'
    type: object
  internal_handlers.claimRequest:
    properties:
      amount:
        description: 0 = claim all
        type: integer
    type: object
  internal_handlers.redeemRequest:
    properties:
      amount:
        minimum: 1
        type: integer
    required:
    - amount
    type: object
  internal_handlers.redeemResponse:
    properties:
      balance:
        type: integer
    type: object
  internal_handlers.tachiBalanceResponse:
    properties:
      tachi_balance:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend API for tachigo — Twitch extension + Web3 rewards platform
  title: tachigo API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Always returns 200 to prevent user enumeration
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Request a password reset email
      tags:
      - auth
  /auth/google:
    get:
      produces:
      - application/json
      responses:
        "302":
          description: Found
      summary: Redirect to Google OAuth
      tags:
      - auth
  /auth/google/callback:
    get:
      parameters:
      - description: OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Google OAuth callback
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_services.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Login with email and password
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token fallback when cookie is unavailable
        in: body
        name: body
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Logout and invalidate refresh token
      tags:
      - auth
  /auth/providers/{provider}:
    delete:
      parameters:
      - description: Provider name
        enum:
        - twitch
        - google
        - web3
        - email
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      security:
      - BearerAuth: []
      summary: Unlink an OAuth provider from the current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token fallback when cookie is unavailable
        in: body
        name: body
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.TokensResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_services.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Register a new user
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Token and new password (min 8 chars)
        in: body
        name: body
        required: true
        schema:
          properties:
            new_password:
              type: string
            token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Reset password using token
      tags:
      - auth
  /auth/twitch:
    get:
      produces:
      - application/json
      responses:
        "302":
          description: Found
      summary: Redirect to Twitch OAuth
      tags:
      - auth
  /auth/twitch/callback:
    get:
      parameters:
      - description: OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Twitch OAuth callback
      tags:
      - auth
  /auth/verify-email/confirm:
    post:
      consumes:
      - application/json
      parameters:
      - description: Verification token
        in: body
        name: body
        required: true
        schema:
          properties:
            token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Confirm email verification token
      tags:
      - auth
  /auth/verify-email/send:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      security:
      - BearerAuth: []
      summary: Send or resend email verification
      tags:
      - auth
  /auth/web3/nonce:
    post:
      consumes:
      - application/json
      parameters:
      - description: Wallet address
        in: body
        name: body
        required: true
        schema:
          properties:
            address:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.NonceResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Get a sign-in nonce for a wallet address
      tags:
      - auth
  /auth/web3/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: Wallet address, nonce and signature
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_services.Web3VerifyInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Verify wallet signature and authenticate
      tags:
      - auth
  /extension/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Extension JWT from Twitch
        in: body
        name: body
        required: true
        schema:
          properties:
            extension_jwt:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Authenticate via Twitch Extension JWT
      tags:
      - extension
  /extension/bits/complete:
    post:
      consumes:
      - application/json
      parameters:
      - description: Bits transaction payload
        in: body
        name: body
        required: true
        schema:
          properties:
            extension_jwt:
              type: string
            sku:
              type: string
            transaction_receipt:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      summary: Complete a Bits transaction
      tags:
      - extension
  /spend/redeem:
    post:
      consumes:
      - application/json
      parameters:
      - description: Amount to burn (must be > 0)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.redeemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.redeemResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      security:
      - BearerAuth: []
      summary: Burn $TACHI to redeem a discount coupon
      tags:
      - spend
  /users/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.UserResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - users
    put:
      consumes:
      - application/json
      parameters:
      - description: Profile fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_services.UpdateProfileInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - users
  /users/me/addresses:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AddressesResponse'
              type: object
      security:
      - BearerAuth: []
      summary: List shipping addresses
      tags:
      - addresses
    post:
      consumes:
      - application/json
      parameters:
      - description: Address payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_services.AddressInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.AddressResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      security:
      - BearerAuth: []
      summary: Create a shipping address
      tags:
      - addresses
  /users/me/addresses/{id}:
    delete:
      parameters:
      - description: Address UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.Response'
      security:
      - BearerAuth: []
      summary: Delete a shipping address
      tags:
      - addresses
    put:
      consumes:
      - application/json
      parameters:
      - description: Address UUID
        in: path
        name: id
        required: true
        type: string
      - description: Address payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_tachigo_tachigo_internal_services.AddressInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_handlers.Response'
