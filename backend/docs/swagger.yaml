basePath: /api/v1
definitions:
  handlers.AddressResponse:
    properties:
      address:
        $ref: '#/definitions/models.ShippingAddress'
    type: object
  handlers.AddressesResponse:
    properties:
      addresses:
        items:
          $ref: '#/definitions/models.ShippingAddress'
        type: array
    type: object
  handlers.AuthResponse:
    properties:
      tokens:
        $ref: '#/definitions/services.TokenPair'
      user:
        $ref: '#/definitions/models.User'
    type: object
  handlers.MessageResponse:
    properties:
      message:
        type: string
    type: object
  handlers.NonceResponse:
    properties:
      nonce:
        type: string
    type: object
  handlers.ProvidersResponse:
    properties:
      providers:
        items:
          $ref: '#/definitions/models.AuthProvider'
        type: array
    type: object
  handlers.Response:
    properties:
      data: {}
      error:
        type: string
      success:
        type: boolean
    type: object
  handlers.TokensResponse:
    properties:
      tokens:
        $ref: '#/definitions/services.TokenPair'
    type: object
  handlers.UserResponse:
    properties:
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.AuthProvider:
    properties:
      created_at:
        type: string
      id:
        type: string
      metadata:
        type: object
      provider:
        $ref: '#/definitions/models.ProviderType'
      provider_id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.ProviderType:
    enum:
    - twitch
    - google
    - web3
    - email
    type: string
    x-enum-varnames:
    - ProviderTwitch
    - ProviderGoogle
    - ProviderWeb3
    - ProviderEmail
  models.ShippingAddress:
    properties:
      address_line1:
        type: string
      address_line2:
        type: string
      city:
        type: string
      country:
        type: string
      created_at:
        type: string
      district:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      phone:
        type: string
      postal_code:
        type: string
      recipient_name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.User:
    properties:
      addresses:
        items:
          $ref: '#/definitions/models.ShippingAddress'
        type: array
      auth_providers:
        items:
          $ref: '#/definitions/models.AuthProvider'
        type: array
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      id:
        type: string
      is_active:
        type: boolean
      role:
        $ref: '#/definitions/models.UserRole'
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserRole:
    enum:
    - viewer
    - streamer
    - agency
    - admin
    type: string
    x-enum-varnames:
    - RoleViewer
    - RoleStreamer
    - RoleAgency
    - RoleAdmin
  services.AddressInput:
    properties:
      address_line1:
        type: string
      address_line2:
        type: string
      city:
        type: string
      country:
        type: string
      district:
        type: string
      is_default:
        type: boolean
      phone:
        type: string
      postal_code:
        type: string
      recipient_name:
        type: string
    required:
    - address_line1
    - city
    - recipient_name
    type: object
  services.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  services.RegisterInput:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  services.TokenPair:
    properties:
      access_token:
        type: string
      expires_in:
        description: seconds
        type: integer
      refresh_token:
        type: string
    type: object
  services.UpdateProfileInput:
    properties:
      avatar_url:
        type: string
      username:
        type: string
    type: object
  services.Web3VerifyInput:
    properties:
      address:
        type: string
      nonce:
        type: string
      signature:
        type: string
    required:
    - address
    - nonce
    - signature
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend API for tachigo — Twitch extension + Web3 rewards platform
  title: tachigo API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Always returns 200 to prevent user enumeration
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Request a password reset email
      tags:
      - auth
  /auth/google:
    get:
      produces:
      - application/json
      responses:
        "302":
          description: Found
      summary: Redirect to Google OAuth
      tags:
      - auth
  /auth/google/callback:
    get:
      parameters:
      - description: OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Google OAuth callback
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Login with email and password
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Logout and invalidate refresh token
      tags:
      - auth
  /auth/providers/{provider}:
    delete:
      parameters:
      - description: Provider name
        enum:
        - twitch
        - google
        - web3
        - email
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.Response'
      security:
      - BearerAuth: []
      summary: Unlink an OAuth provider from the current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.TokensResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Register a new user
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Token and new password (min 8 chars)
        in: body
        name: body
        required: true
        schema:
          properties:
            new_password:
              type: string
            token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Reset password using token
      tags:
      - auth
  /auth/twitch:
    get:
      produces:
      - application/json
      responses:
        "302":
          description: Found
      summary: Redirect to Twitch OAuth
      tags:
      - auth
  /auth/twitch/callback:
    get:
      parameters:
      - description: OAuth authorization code
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Twitch OAuth callback
      tags:
      - auth
  /auth/verify-email/confirm:
    post:
      consumes:
      - application/json
      parameters:
      - description: Verification token
        in: body
        name: body
        required: true
        schema:
          properties:
            token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Confirm email verification token
      tags:
      - auth
  /auth/verify-email/send:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.Response'
      security:
      - BearerAuth: []
      summary: Send or resend email verification
      tags:
      - auth
  /auth/web3/nonce:
    post:
      consumes:
      - application/json
      parameters:
      - description: Wallet address
        in: body
        name: body
        required: true
        schema:
          properties:
            address:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.NonceResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Get a sign-in nonce for a wallet address
      tags:
      - auth
  /auth/web3/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: Wallet address, nonce and signature
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.Web3VerifyInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Verify wallet signature and authenticate
      tags:
      - auth
  /extension/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Extension JWT from Twitch
        in: body
        name: body
        required: true
        schema:
          properties:
            extension_jwt:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Authenticate via Twitch Extension JWT
      tags:
      - extension
  /extension/bits/complete:
    post:
      consumes:
      - application/json
      parameters:
      - description: Bits transaction payload
        in: body
        name: body
        required: true
        schema:
          properties:
            extension_jwt:
              type: string
            sku:
              type: string
            transaction_receipt:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Complete a Bits transaction
      tags:
      - extension
  /users/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.UserResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.Response'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - users
    put:
      consumes:
      - application/json
      parameters:
      - description: Profile fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.UpdateProfileInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.Response'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - users
  /users/me/addresses:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AddressesResponse'
              type: object
      security:
      - BearerAuth: []
      summary: List shipping addresses
      tags:
      - addresses
    post:
      consumes:
      - application/json
      parameters:
      - description: Address payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.AddressInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AddressResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
      security:
      - BearerAuth: []
      summary: Create a shipping address
      tags:
      - addresses
  /users/me/addresses/{id}:
    delete:
      parameters:
      - description: Address UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.Response'
      security:
      - BearerAuth: []
      summary: Delete a shipping address
      tags:
      - addresses
    put:
      consumes:
      - application/json
      parameters:
      - description: Address UUID
        in: path
        name: id
        required: true
        type: string
      - description: Address payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.AddressInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AddressResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.Response'
      security:
      - BearerAuth: []
      summary: Update a shipping address
      tags:
      - addresses
  /users/me/addresses/{id}/default:
    put:
      parameters:
      - description: Address UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.AddressResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.Response'
      security:
      - BearerAuth: []
      summary: Set an address as default
      tags:
      - addresses
  /users/me/providers:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handlers.Response'
            - properties:
                data:
                  $ref: '#/definitions/handlers.ProvidersResponse'
              type: object
      security:
      - BearerAuth: []
      summary: List linked OAuth providers
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: 'Enter: Bearer {access_token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
