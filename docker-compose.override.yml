services:
  app:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
    restart: "no"

  frontend:
    restart: "no"

  postgres:
    restart: "no"

  dashboard:
    build: ./apps/dashboard
    ports:
      - "5174:5174"
    volumes:
      - ./apps/dashboard/src:/app/src
      - ./apps/dashboard/public:/app/public
      - ./apps/dashboard/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - app
    restart: "no"

volumes:
  go_mod_cache:
