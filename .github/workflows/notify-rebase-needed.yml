name: Notify PRs needing rebase

on:
  pull_request:
    types: [closed]
    branches: [develop]

permissions:
  pull-requests: read
  issues: write

jobs:
  notify:
    name: Comment on conflicting PRs
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Find conflicting PRs and notify
        uses: actions/github-script@v7
        with:
          script: |
            const mergedPR = context.payload.pull_request
            const { owner, repo } = context.repo

            // Wait for GitHub to calculate mergeability
            await new Promise((r) => setTimeout(r, 15000))

            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'develop',
              per_page: 100,
            })

            const targets = openPRs.filter((pr) => pr.number !== mergedPR.number)
            if (targets.length === 0) return

            // Re-fetch each PR to get fresh mergeable_state
            const dirty = []
            for (const pr of targets) {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              })
              if (data.mergeable_state === 'dirty') {
                dirty.push(data)
              }
            }

            if (dirty.length === 0) {
              core.info('No conflicting PRs found.')
              return
            }

            for (const pr of dirty) {
              const headSha = pr.head?.sha || pr.updated_at || 'unknown'
              const marker = `<!-- notify-rebase-needed:head=${headSha} -->`
              const body = [
                marker,
                `> [!WARNING]`,
                `> **PR #${mergedPR.number}** ([${mergedPR.title}](${mergedPR.html_url})) 已 merge 進 \`develop\`，本 PR 目前有衝突，請 rebase。`,
                `>`,
                `> \`\`\`bash`,
                `> git fetch origin && git rebase origin/develop`,
                `> \`\`\``,
              ].join('\n')

              const existingComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              })
              if (existingComments.some((comment) => comment.body?.includes(marker))) {
                core.info(`PR #${pr.number} already has a rebase notification for head ${headSha}.`)
                continue
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              })
              core.info(`Notified PR #${pr.number}`)
            }
