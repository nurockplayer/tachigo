  backend:
    name: Backend tests
    needs: [scope-gate]
    if: github.event_name == 'push' || needs.scope-gate.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: dev
          load: true
          tags: tachigo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        run: docker compose run --pull never --no-deps --rm app go test ./...

  backend-integration:
    name: Backend integration tests
    needs: [scope-gate, backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (needs.scope-gate.outputs.run_ci == 'true' && needs.scope-gate.outputs.run_backend_integration == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: dev
          load: true
          tags: tachigo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start PostgreSQL
        run: docker compose up -d --wait postgres

      - name: Run integration build
        run: docker compose run --pull never --rm app go build -tags integration ./...

      - name: Run integration tests
        run: docker compose run --pull never --rm app go test -tags integration ./... -count=1

      - name: Stop services
        if: always()
        run: docker compose down -v

  frontend:
    name: Frontend build
    needs: [scope-gate]
    if: github.event_name == 'push' || needs.scope-gate.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build image
        run: docker compose build frontend

      - name: Lint
        run: docker compose run --no-deps --rm frontend pnpm lint

      - name: Test
        run: docker compose run --no-deps --rm frontend pnpm test

      - name: Build
        run: docker compose run --no-deps --rm frontend pnpm build

  dashboard:
    name: Dashboard build
    needs: [scope-gate]
    if: github.event_name == 'push' || needs.scope-gate.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build dashboard

      - name: Lint
        run: docker compose run --no-deps --rm dashboard pnpm lint

      - name: Test
        run: docker compose run --no-deps --rm dashboard pnpm test

      - name: Build
        run: docker compose run --no-deps --rm dashboard pnpm build

  contracts:
    name: Contracts build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 --no-git

      - name: Build
        working-directory: contracts
        run: forge build

      - name: Test
        working-directory: contracts
        run: forge test

  notify-discord:
    name: Notify Discord on failure
    needs: [workflow-regression, check-cache-wiring, backend, backend-integration, frontend, dashboard, contracts]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          curl -X POST "${{ secrets.DISCORD_CI_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"CI failed on \`${{ github.ref_name }}\` (${{ github.event_name }})\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
