name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scope-gate:
    timeout-minutes: 5
    name: Scope gate
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.evaluate.outputs.run_ci }}
      run_backend: ${{ steps.evaluate.outputs.run_backend }}
      run_backend_integration: ${{ steps.evaluate.outputs.run_backend_integration }}
      run_backend_scanners: ${{ steps.evaluate.outputs.run_backend_scanners }}
      run_dependency_review: ${{ steps.evaluate.outputs.run_dependency_review }}
      run_frontend: ${{ steps.evaluate.outputs.run_frontend }}
      run_dashboard: ${{ steps.evaluate.outputs.run_dashboard }}
      run_contracts: ${{ steps.evaluate.outputs.run_contracts }}
      run_contracts_slither: ${{ steps.evaluate.outputs.run_contracts_slither }}
      run_contracts_gas_report: ${{ steps.evaluate.outputs.run_contracts_gas_report }}
    steps:
      - name: Evaluate PR scope for CI
        id: evaluate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const setCiOutputs = ({
              runCi,
              runBackend,
              runBackendIntegration,
              runBackendScanners,
              runDependencyReview,
              runFrontend,
              runDashboard,
              runContracts,
              runContractsSlither,
              runContractsGasReport,
            }) => {
              core.setOutput('run_ci', runCi ? 'true' : 'false')
              core.setOutput('run_backend', runBackend ? 'true' : 'false')
              core.setOutput('run_backend_integration', runBackendIntegration ? 'true' : 'false')
              core.setOutput('run_backend_scanners', runBackendScanners ? 'true' : 'false')
              core.setOutput('run_dependency_review', runDependencyReview ? 'true' : 'false')
              core.setOutput('run_frontend', runFrontend ? 'true' : 'false')
              core.setOutput('run_dashboard', runDashboard ? 'true' : 'false')
              core.setOutput('run_contracts', runContracts ? 'true' : 'false')
              core.setOutput('run_contracts_slither', runContractsSlither ? 'true' : 'false')
              core.setOutput('run_contracts_gas_report', runContractsGasReport ? 'true' : 'false')
            }
            const setFullCiOutputs = () => setCiOutputs({
              runCi: true,
              runBackend: true,
              runBackendIntegration: true,
              runBackendScanners: true,
              runDependencyReview: false,
              runFrontend: true,
              runDashboard: true,
              runContracts: true,
              runContractsSlither: true,
              runContractsGasReport: true,
            })
            const setSkippedCiOutputs = () => setCiOutputs({
              runCi: false,
              runBackend: false,
              runBackendIntegration: false,
              runBackendScanners: false,
              runDependencyReview: false,
              runFrontend: false,
              runDashboard: false,
              runContracts: false,
              runContractsSlither: false,
              runContractsGasReport: false,
            })

            const pr = context.payload.pull_request
            if (!pr) {
              if (context.eventName === 'schedule') {
                core.notice('Scheduled backend scanner and contracts Slither report run detected; running scanner jobs only.')
                setCiOutputs({
                  runCi: true,
                  runBackend: false,
                  runBackendIntegration: false,
                  runBackendScanners: true,
                  runDependencyReview: false,
                  runFrontend: false,
                  runDashboard: false,
                  runContracts: false,
                  runContractsSlither: true,
                  runContractsGasReport: false,
                })
                return
              }
              core.notice('Non-PR event detected; running CI without scope gate restrictions.')
              setFullCiOutputs()
              return
            }

            const isSameRepoHead =
              pr.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`
            const isReleasePromotionPr =
              isSameRepoHead &&
              pr.base?.ref === 'main' &&
              pr.head?.ref === 'develop'
            const isDependabotPr = pr.user?.login === 'dependabot[bot]'

            const bypassLabels = new Set(['scope-exception'])
            const labels = (pr.labels || []).map((label) => label.name)
            if (labels.some((label) => bypassLabels.has(label))) {
              core.notice('Scope gate bypassed by scope-exception label.')
              setFullCiOutputs()
              return
            }

            const hardMaxChangedFiles = 35
            const hardMaxDiffLines = 1000
            const owner = context.repo.owner
            const repo = context.repo.repo

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            })

            const filenames = files.map((file) => file.filename)
            const allFilePaths = files.flatMap((f) =>
              f.status === 'renamed' && f.previous_filename ? [f.filename, f.previous_filename] : [f.filename]
            )
            const diffLines = files.reduce((sum, file) => sum + file.additions + file.deletions, 0)
            const isDocsOrTemplatePath = (name) =>
              name.startsWith('docs/') ||
              name.startsWith('docs/ai/') ||
              name.startsWith('plans/') ||
              name.startsWith('.github/ISSUE_TEMPLATE/') ||
              name === '.github/PULL_REQUEST_TEMPLATE.md' ||
              /^[^/]+\.md$/i.test(name)
            const isNonProductMetadataPath = (name) =>
              isDocsOrTemplatePath(name) ||
              name.startsWith('infra/') ||
              name === '.gitignore' ||
              name === '.gitattributes'
            const isDocsTemplateOrMetadataOnly =
              allFilePaths.length > 0 && allFilePaths.every(isNonProductMetadataPath)
            const body = pr.body || ''
            const title = pr.title || ''
            const allowedPrefixes = ['[backend]', '[frontend]', '[contract]', '[discussion]', '[release]', '[infra]', '[chore]']
            const titlePrefix = allowedPrefixes.find((prefix) => title.startsWith(prefix))
            const touches = {
              backend: allFilePaths.some((name) =>
                name.startsWith('backend/') || name.startsWith('services/api/'),
              ),
              extension: allFilePaths.some((name) =>
                name.startsWith('tachimint/') || name.startsWith('apps/extension/'),
              ),
              dashboard: allFilePaths.some((name) =>
                name.startsWith('dashboard/') || name.startsWith('apps/dashboard/'),
              ),
              frontend: allFilePaths.some((name) =>
                name.startsWith('dashboard/') ||
                name.startsWith('tachimint/') ||
                name.startsWith('apps/dashboard/') ||
                name.startsWith('apps/extension/'),
              ),
              contracts: allFilePaths.some((name) => name.startsWith('contracts/')),
              packages: allFilePaths.some((name) => name.startsWith('packages/')),
            }
            const productSurfaces = ['backend', 'frontend', 'contracts'].filter((surface) => touches[surface]).length

            const dependsOnMatch = body.match(/Depends on PR[：:]\s*(.+)/i)
            const dependsOnRaw = dependsOnMatch?.[1]?.trim()
            const dependsOnNone = dependsOnRaw?.toLowerCase() === 'none'
            const dependsOnPrMatch = dependsOnRaw?.match(/^#(\d+)$/)
            const backendContractYes = /Backend contract already in develop\s*[：:][\s\S]*?- \[[xX]\] yes/i.test(body)
            const backendContractNo = /Backend contract already in develop\s*[：:][\s\S]*?- \[[xX]\] no/i.test(body)
            const dependencyBlocked =
              titlePrefix === '[frontend]' &&
              Boolean(dependsOnPrMatch) &&
              backendContractNo &&
              !backendContractYes

            const releaseBodyValid =
              titlePrefix === '[release]' &&
              (body.includes('Source of truth：') || body.includes('Source of truth:')) &&
              Boolean(dependsOnRaw) &&
              (dependsOnNone || Boolean(dependsOnPrMatch)) &&
              body.includes('本 PR 明確不做') &&
              backendContractYes &&
              !backendContractNo

            const standardBodyValid =
              Boolean(titlePrefix) &&
              titlePrefix !== '[release]' &&
              /#\d+/.test(body) &&
              (body.includes('Source of truth：') || body.includes('Source of truth:')) &&
              Boolean(dependsOnRaw) &&
              (dependsOnNone || Boolean(dependsOnPrMatch)) &&
              (backendContractYes !== backendContractNo) &&
              body.includes('本 PR 明確不做')
            const bodyValidForCi = isDependabotPr || standardBodyValid

            const runCi =
              (isReleasePromotionPr && releaseBodyValid) ||
              bodyValidForCi &&
              !isDocsTemplateOrMetadataOnly &&
              (isReleasePromotionPr || filenames.length <= hardMaxChangedFiles) &&
              (isReleasePromotionPr || diffLines <= hardMaxDiffLines) &&
              (isReleasePromotionPr || productSurfaces <= 1) &&
              (isReleasePromotionPr || !(titlePrefix === '[backend]' && touches.frontend)) &&
              (isReleasePromotionPr || !(titlePrefix === '[frontend]' && touches.backend)) &&
              (isReleasePromotionPr || !(titlePrefix === '[contract]' && (touches.backend || touches.frontend))) &&
              !dependencyBlocked

            const backendIntegrationPaths = [
              /^backend\//,
              /^services\/api\//,
              /^contracts\//,
              /^docker-compose(?:\..+)?\.ya?ml$/,
              /^\.github\/workflows\/ci\.yml$/,
            ]
            const ciWorkflowPaths = [
              /^\.github\/workflows\/ci\.yml$/,
              /^\.github\/workflows\/ci\.test\.mjs$/,
            ]
            const dockerComposePaths = [/^docker-compose(?:\..+)?\.ya?ml$/]
            const frontendWorkspacePaths = [
              /^package\.json$/,
              /^pnpm-lock\.yaml$/,
              /^pnpm-workspace\.yaml$/,
            ]
            const dependencyReviewPaths = [
              /^apps\/dashboard\/package\.json$/,
              /^apps\/dashboard\/pnpm-lock\.yaml$/,
              /^apps\/extension\/package\.json$/,
              /^apps\/extension\/pnpm-lock\.yaml$/,
              /^package\.json$/,
              /^pnpm-lock\.yaml$/,
              /^pnpm-workspace\.yaml$/,
            ]
            const runFullCi = runCi && (
              isReleasePromotionPr ||
              allFilePaths.some((name) => ciWorkflowPaths.some((pattern) => pattern.test(name)))
            )
            const touchesDockerCompose = allFilePaths.some((name) =>
              dockerComposePaths.some((pattern) => pattern.test(name)),
            )
            const touchesFrontendWorkspace = allFilePaths.some((name) =>
              frontendWorkspacePaths.some((pattern) => pattern.test(name)),
            )
            const runBackend = runFullCi || (runCi && (touches.backend || touchesDockerCompose))
            const runFrontend = runFullCi || (runCi && (touches.extension || touchesFrontendWorkspace || touchesDockerCompose))
            const runDashboard = runFullCi || (runCi && (touches.dashboard || touchesFrontendWorkspace || touchesDockerCompose))
            const runContracts = runFullCi || (runCi && touches.contracts)
            const runContractsGasReport = runFullCi || (runCi && touches.contracts)
            const runBackendScanners = runFullCi || (runCi && (touches.backend || touchesDockerCompose))
            const runContractsSlither = runFullCi || (runCi && touches.contracts)
            const runDependencyReview = runCi && allFilePaths.some((name) =>
              dependencyReviewPaths.some((pattern) => pattern.test(name)),
            )
            const runBackendIntegration = allFilePaths.some((name) =>
              backendIntegrationPaths.some((pattern) => pattern.test(name)),
            )
            const shouldRunBackendIntegration = runFullCi || (runCi && runBackendIntegration)

            if (runCi) {
              setCiOutputs({
                runCi,
                runBackend,
                runBackendIntegration: shouldRunBackendIntegration,
                runBackendScanners,
                runDependencyReview,
                runFrontend,
                runDashboard,
                runContracts,
                runContractsSlither,
                runContractsGasReport,
              })
            } else {
              setSkippedCiOutputs()
            }
            if (isDocsTemplateOrMetadataOnly) {
              core.notice('Skipping heavy product CI because this PR only changes docs/templates/metadata.')
            } else if (!runCi) {
              core.notice('Skipping heavy CI because this PR does not currently pass scope rules.')
            }
            if (runCi && !shouldRunBackendIntegration) {
              core.notice('Skipping backend integration tests because this PR does not touch backend, contracts, docker compose, or CI workflow files.')
            }

  check-cache-wiring:
    timeout-minutes: 5
    name: Check backend CI cache wiring
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify Docker Buildx cache configuration
        run: bash infra/scripts/check-backend-ci-cache.sh

  workflow-regression:
    timeout-minutes: 5
    name: Workflow regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0

      - name: Verify CI workflow assertions
        run: node --test .github/workflows/ci.test.mjs

  commit-message-regression:
    timeout-minutes: 5
    name: Commit message regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify commit message hook assertions
        run: bash infra/scripts/commit-message-check.test.sh

  pr-metadata-regression:
    timeout-minutes: 5
    name: PR metadata check regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Configure git identity for test commits
        run: |
          git config user.email "ci@test.local"
          git config user.name "CI Test"

      - name: Verify PR metadata check assertions
        run: bash infra/scripts/pr-metadata-check.test.sh

      - name: Verify PR open assertions
        run: bash infra/scripts/pr-open.test.sh

  pr-commit-messages:
    timeout-minutes: 5
    name: PR commit messages
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]' && (github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.base.ref != 'main' || github.event.pull_request.head.ref != 'develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate PR commit messages
        run: bash infra/scripts/check-pr-commit-messages.sh "origin/${{ github.base_ref }}" "${{ github.event.pull_request.head.sha }}"

  backend-build:
    timeout-minutes: 15
    name: Build backend image
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./services/api
          target: dev
          load: false
          tags: tachigo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend:
    timeout-minutes: 10
    name: Backend tests
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: services/api/go.mod

      - name: Run tests
        working-directory: services/api
        run: go test ./...

      - name: Run vet
        working-directory: services/api
        run: go vet ./...

  atlas-migration-tooling:
    timeout-minutes: 10
    name: Atlas migration tooling
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: services/api/go.mod

      - name: Set up Atlas
        uses: ariga/setup-atlas@2f3c785c89a15e1c0d07bcae3900fb5feb969eea # v0
        with:
          version: v0.37.0

      - name: Verify GORM loader output
        working-directory: services/api
        run: go run ./cmd/loader/main.go > /tmp/tachigo-gorm-schema.sql

      - name: Verify Atlas can inspect the GORM schema source
        working-directory: services/api
        run: atlas schema inspect --env gorm --url env://src --format '{{ sql . }}' > /tmp/tachigo-atlas-inspect-schema.sql

      - name: Detect changed migration files
        id: migration-changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "origin/${{ github.base_ref }}" "${{ github.event.pull_request.head.sha }}" -- 'services/api/migrations/*.sql' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint changed Atlas migrations
        if: steps.migration-changes.outputs.changed == 'true'
        working-directory: services/api
        run: atlas migrate lint --env gorm --git-base "origin/${{ github.base_ref }}"

  backend-integration:
    timeout-minutes: 20
    name: Backend integration tests
    needs: [scope-gate, check-cache-wiring]
    runs-on: ubuntu-latest
    if: needs.scope-gate.outputs.run_backend_integration == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: services/api/go.mod

      - name: Run integration tests
        working-directory: services/api
        run: go test -tags integration -v ./... -count=1

  backend-security-scanners:
    timeout-minutes: 10
    name: Backend security scanners
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_backend_scanners == 'true'
    runs-on: ubuntu-latest
    env:
      STATICCHECK_VERSION: v0.7.0
      GOVULNCHECK_VERSION: v1.3.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.3

      - name: Install scanner tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@$STATICCHECK_VERSION
          go install golang.org/x/vuln/cmd/govulncheck@$GOVULNCHECK_VERSION

      - name: Add Go tools to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run staticcheck
        working-directory: services/api
        run: staticcheck ./...

      - name: Run govulncheck
        working-directory: services/api
        run: govulncheck ./...

  dependency-review:
    timeout-minutes: 10
    name: Dependency Review
    needs: scope-gate
    if: github.event_name == 'pull_request' && needs.scope-gate.outputs.run_dependency_review == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          fail-on-scopes: runtime
          vulnerability-check: true
          license-check: false
          comment-summary-in-pr: never
          show-openssf-scorecard: false

  frontend:
    timeout-minutes: 15
    name: Frontend build
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - name: Build image
        run: docker compose build frontend

      - name: Lint
        run: docker compose run --no-deps --rm frontend pnpm lint

      - name: Test
        run: docker compose run --no-deps --rm frontend pnpm test

      - name: Build
        run: docker compose run --no-deps --rm frontend pnpm build

      - name: i18n check
        run: docker compose run --no-deps --rm frontend pnpm check:i18n

  dashboard:
    timeout-minutes: 15
    name: Dashboard build
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build image
        run: docker compose build dashboard

      - name: Lint
        run: docker compose run --no-deps --rm dashboard pnpm lint

      - name: Test
        run: docker compose run --no-deps --rm dashboard pnpm test

      - name: Build
        run: docker compose run --no-deps --rm dashboard pnpm build

  contracts:
    timeout-minutes: 20
    name: Contracts build
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1

      - name: Install dependencies
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 --no-git

      - name: Build
        working-directory: contracts
        run: forge build

      - name: Test
        working-directory: contracts
        run: forge test

      - name: Format check
        working-directory: contracts
        run: forge fmt --check

  contracts-slither:
    timeout-minutes: 20
    name: Contracts Slither report
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_contracts_slither == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1

      - name: Install Solidity dependencies
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 --no-git

      - name: Run Slither
        id: slither
        uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        with:
          target: contracts
          slither-version: 0.11.5
          sarif: slither.sarif
          fail-on: none

      - name: Upload Slither SARIF
        if: always() && steps.slither.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}

      - name: Upload Slither report artifact
        if: always() && steps.slither.outputs.sarif != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: slither-report
          path: ${{ steps.slither.outputs.sarif }}
          if-no-files-found: warn

  contracts-gas-snapshot:
    timeout-minutes: 20
    name: Contracts gas snapshot report
    needs: [scope-gate]
    if: needs.scope-gate.outputs.run_contracts_gas_report == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1

      - name: Install dependencies
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 --no-git

      - name: Generate gas snapshot report
        working-directory: contracts
        run: forge snapshot --snap gas-snapshot.report

      - name: Print gas snapshot report
        working-directory: contracts
        run: cat gas-snapshot.report

      - name: Upload gas snapshot report artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: contracts-gas-snapshot-report
          path: contracts/gas-snapshot.report
          if-no-files-found: error

  backend-ci:
    timeout-minutes: 5
    name: Backend CI (gate)
    needs: [backend-build, backend, backend-integration, backend-security-scanners]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check backend CI status
        env:
          BACKEND_BUILD_RESULT: ${{ needs.backend-build.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          BACKEND_INTEGRATION_RESULT: ${{ needs.backend-integration.result }}
          BACKEND_SECURITY_SCANNERS_RESULT: ${{ needs.backend-security-scanners.result }}
        run: |
          for item in \
            "backend-build:$BACKEND_BUILD_RESULT" \
            "backend:$BACKEND_RESULT" \
            "backend-integration:$BACKEND_INTEGRATION_RESULT" \
            "backend-security-scanners:$BACKEND_SECURITY_SCANNERS_RESULT"
          do
            job="${item%%:*}"
            result="${item#*:}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "❌ $job: $result"
              exit 1
            fi
          done
          echo "✓ Backend CI passed"

  auto-ready-after-ci:
    timeout-minutes: 5
    name: Auto-ready draft PR after CI
    needs: [scope-gate, backend-ci, dependency-review, frontend, dashboard, contracts, contracts-slither, contracts-gas-snapshot]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
      issues: write
      statuses: read
      pull-requests: write
    steps:
      - name: Mark auto-ready draft PR ready
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          SCOPE_GATE_RESULT: ${{ needs.scope-gate.result }}
          BACKEND_CI_RESULT: ${{ needs.backend-ci.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DASHBOARD_RESULT: ${{ needs.dashboard.result }}
          CONTRACTS_RESULT: ${{ needs.contracts.result }}
          CONTRACTS_SLITHER_RESULT: ${{ needs.contracts-slither.result }}
          CONTRACTS_GAS_SNAPSHOT_RESULT: ${{ needs.contracts-gas-snapshot.result }}
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const autoReadyLabel = 'auto-ready'
            const reviewLabel = 'needs-codex-review'
            const changesLabel = 'changes-requested'
            const targetBaseBranches = new Set(['main', 'develop'])
            const allowedJobResults = new Set(['success', 'skipped'])
            const successConclusions = new Set(['success', 'neutral', 'skipped'])
            const ownCheckNames = new Set(['Auto-ready draft PR after CI'])
            const currentHeadSha = context.payload.pull_request?.head?.sha
            const requiredCheckSnapshots = {
              develop: [
                { context: 'Scope gate', appId: 15368 },
                { context: 'Frontend build', appId: 15368 },
                { context: 'Dashboard build', appId: 15368 },
                { context: 'Contracts build', appId: 15368 },
                { context: 'Backend CI (gate)', appId: 15368 },
              ],
              main: [
                { context: 'Scope police', appId: 15368 },
              ],
            }
            const requiredJobResults = [
              ['scope-gate', process.env.SCOPE_GATE_RESULT],
              ['backend-ci', process.env.BACKEND_CI_RESULT],
              ['dependency-review', process.env.DEPENDENCY_REVIEW_RESULT],
              ['frontend', process.env.FRONTEND_RESULT],
              ['dashboard', process.env.DASHBOARD_RESULT],
              ['contracts', process.env.CONTRACTS_RESULT],
              ['contracts-slither', process.env.CONTRACTS_SLITHER_RESULT],
              ['contracts-gas-snapshot', process.env.CONTRACTS_GAS_SNAPSHOT_RESULT],
            ]

            for (const [job, result] of requiredJobResults) {
              if (!allowedJobResults.has(result)) {
                core.info(`Skipping auto-ready: ${job} finished with ${result}.`)
                return
              }
            }

            const hasAutoReadyLabel = (pr) =>
              (pr.labels || []).some((label) => label.name === autoReadyLabel)

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name })
              } catch (error) {
                if (error.status !== 404) throw error
                await github.rest.issues.createLabel({ owner, repo, name, color, description })
              }
            }

            const removeLabel = async (issue_number, name) => {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name })
              } catch (error) {
                if (error.status !== 404) throw error
              }
            }

            const flagForCodexReview = async (pr) => {
              await ensureLabel(
                reviewLabel,
                '0075ca',
                'New PR opened or new commits pushed after the latest Codex review — pending Codex review',
              )
              await ensureLabel(
                changesLabel,
                'd73a4a',
                'Codex has requested changes — author should update the PR',
              )
              await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: [reviewLabel] })
              await removeLabel(pr.number, changesLabel)
            }

            const enableAutoMerge = async (pr) => {
              await github.graphql(
                `
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: MERGE }) {
                      pullRequest {
                        number
                        autoMergeRequest {
                          mergeMethod
                        }
                      }
                    }
                  }
                `,
                { pullRequestId: pr.node_id },
              )
            }

            const isEligibleAutoReadyPr = (pr) => {
              if (!targetBaseBranches.has(pr.base?.ref)) return false
              if (pr.user?.login === 'dependabot[bot]') return false
              if (pr.head?.repo?.full_name !== `${owner}/${repo}`) return false
              if (!hasAutoReadyLabel(pr)) return false
              return true
            }

            let pr = context.payload.pull_request
            if (!pr) {
              core.info('Skipping auto-ready: not a pull_request event.')
              return
            }
            if (!isEligibleAutoReadyPr(pr)) {
              core.info(`Skipping PR #${pr.number}: not an eligible ${autoReadyLabel} PR.`)
              return
            }

            try {
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              })
              pr = response.data
            } catch (error) {
              core.warning(`Skipping PR #${pr.number}: failed to refresh PR state (${error?.message || error}).`)
              return
            }

            if (pr.head?.sha !== currentHeadSha) {
              core.info(`Skipping PR #${pr.number}: head SHA changed while CI was running.`)
              return
            }
            if (!isEligibleAutoReadyPr(pr)) {
              core.info(`Skipping PR #${pr.number}: live PR state is no longer eligible.`)
              return
            }

            const requiredCheckKey = (contextName, appId) =>
              appId ? `check:${contextName}:${appId}` : `context:${contextName}`

            const requiredCheckLabel = (check) =>
              check.appId ? `${check.context} from app ${check.appId}` : check.context

            const getRequiredChecks = (baseBranch) => requiredCheckSnapshots[baseBranch] || []

            const listCheckRuns = async (headSha) =>
              github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              })

            const listStatuses = async (headSha) => {
              const response = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: headSha,
              })
              return response.data.statuses || []
            }

            const checkRunPassed = (run) =>
              run.status === 'completed' && successConclusions.has(run.conclusion)

            const statusPassed = (status) => status.state === 'success'

            const observedAt = (item) =>
              Date.parse(item.completed_at || item.updated_at || item.created_at || item.started_at || '') || 0

            const recordObservedContext = (observed, key, passed, item) => {
              const timestamp = observedAt(item)
              const previous = observed.get(key)
              if (!previous || timestamp >= previous.timestamp) {
                observed.set(key, { passed, timestamp })
              }
            }

            const buildObservedContexts = (checkRuns, statuses) => {
              const observed = new Map()

              for (const status of statuses) {
                recordObservedContext(
                  observed,
                  requiredCheckKey(status.context, null),
                  statusPassed(status),
                  status,
                )
              }

              for (const run of checkRuns) {
                if (ownCheckNames.has(run.name)) continue
                const passed = checkRunPassed(run)
                recordObservedContext(observed, requiredCheckKey(run.name, null), passed, run)
                if (run.app?.id) {
                  recordObservedContext(observed, requiredCheckKey(run.name, run.app.id), passed, run)
                }
              }

              return observed
            }

            const requiredChecksPassed = (requiredChecks, observed) => {
              for (const requiredCheck of requiredChecks) {
                if (ownCheckNames.has(requiredCheck.context)) continue
                if (observed.get(requiredCheckKey(requiredCheck.context, requiredCheck.appId))?.passed !== true) {
                  core.info(`Required context is not successful yet: ${requiredCheckLabel(requiredCheck)}`)
                  return false
                }
              }
              return true
            }

            const requiredChecks = getRequiredChecks(pr.base.ref)
            if (requiredChecks.length === 0) {
              core.warning(`Skipping PR #${pr.number}: no required-check snapshot for base ${pr.base.ref}.`)
              return
            }

            let checkRuns = []
            let statuses = []
            try {
              const fetchedChecks = await Promise.all([
                listCheckRuns(pr.head.sha),
                listStatuses(pr.head.sha),
              ])
              checkRuns = fetchedChecks[0]
              statuses = fetchedChecks[1]
            } catch (error) {
              core.warning(
                `Skipping PR #${pr.number} at ${pr.head.sha}: failed to fetch checks/statuses (${error?.message || error}).`,
              )
              return
            }

            const observed = buildObservedContexts(checkRuns, statuses)
            const passed = requiredChecksPassed(requiredChecks, observed)

            if (!passed) {
              core.info(`PR #${pr.number} waits until required checks pass.`)
              return
            }

            const markedReady = pr.draft === true
            if (markedReady) {
              try {
                await github.graphql(
                  `
                    mutation($pullRequestId: ID!) {
                      markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                        pullRequest {
                          number
                          isDraft
                        }
                      }
                    }
                  `,
                  { pullRequestId: pr.node_id },
                )
              } catch (error) {
                core.warning(`Failed to mark PR #${pr.number} ready for review (${error?.message || error}).`)
                return
              }
            }

            try {
              await enableAutoMerge(pr)
            } catch (error) {
              core.warning(
                `Failed to arm auto-merge for PR #${pr.number}; ${autoReadyLabel} will retry while the label remains (${error?.message || error}).`,
              )
              return
            }

            try {
              await flagForCodexReview(pr)
            } catch (error) {
              core.warning(
                `Failed to flag PR #${pr.number} for Codex review; ${autoReadyLabel} will retry while the label remains (${error?.message || error}).`,
              )
              return
            }

            const readyMessage = markedReady ? 'marked ready for review, ' : ''
            core.notice(`PR #${pr.number} ${readyMessage}armed auto-merge, and flagged for Codex review.`)

  notify-discord:
    timeout-minutes: 5
    name: Notify Discord on failure
    needs: [workflow-regression, commit-message-regression, pr-metadata-regression, check-cache-wiring, atlas-migration-tooling, backend-ci, dependency-review, frontend, dashboard, contracts, contracts-slither, contracts-gas-snapshot]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          curl -X POST "${{ secrets.DISCORD_CI_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"CI failed on \`${{ github.ref_name }}\` (${{ github.event_name }})\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
