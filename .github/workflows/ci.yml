name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scope-gate:
    timeout-minutes: 5
    name: Scope gate
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.evaluate.outputs.run_ci }}
      run_backend_integration: ${{ steps.evaluate.outputs.run_backend_integration }}
    steps:
      - name: Evaluate PR scope for CI
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            if (!pr) {
              core.notice('Non-PR event detected; running CI without scope gate restrictions.')
              core.setOutput('run_ci', 'true')
              core.setOutput('run_backend_integration', 'true')
              return
            }

            const isSameRepoHead =
              pr.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`
            const isReleasePromotionPr =
              isSameRepoHead &&
              pr.base?.ref === 'main' &&
              pr.head?.ref === 'develop'

            const bypassLabels = new Set(['scope-exception'])
            const labels = (pr.labels || []).map((label) => label.name)
            if (labels.some((label) => bypassLabels.has(label))) {
              core.notice('Scope gate bypassed by scope-exception label.')
              core.setOutput('run_ci', 'true')
              core.setOutput('run_backend_integration', 'true')
              return
            }

            const hardMaxChangedFiles = 35
            const hardMaxDiffLines = 1000
            const owner = context.repo.owner
            const repo = context.repo.repo

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            })

            const filenames = files.map((file) => file.filename)
            const allFilePaths = files.flatMap((f) =>
              f.status === 'renamed' && f.previous_filename ? [f.filename, f.previous_filename] : [f.filename]
            )
            const diffLines = files.reduce((sum, file) => sum + file.additions + file.deletions, 0)
            const isDocsOrTemplatePath = (name) =>
              name.startsWith('docs/') ||
              name.startsWith('plans/') ||
              name.startsWith('.github/ISSUE_TEMPLATE/') ||
              name === '.github/PULL_REQUEST_TEMPLATE.md' ||
              /^[^/]+\.md$/i.test(name)
            const isNonProductMetadataPath = (name) =>
              isDocsOrTemplatePath(name) ||
              name === '.gitignore' ||
              name === '.gitattributes'
            const isDocsTemplateOrMetadataOnly =
              filenames.length > 0 && filenames.every(isNonProductMetadataPath)
            const body = pr.body || ''
            const title = pr.title || ''
            const allowedPrefixes = ['[backend]', '[frontend]', '[contract]', '[discussion]', '[release]', '[infra]', '[chore]']
            const titlePrefix = allowedPrefixes.find((prefix) => title.startsWith(prefix))
            const touches = {
              backend: allFilePaths.some((name) => name.startsWith('backend/')),
              dashboard: allFilePaths.some((name) => name.startsWith('dashboard/')),
              tachimint: allFilePaths.some((name) => name.startsWith('tachimint/')),
              contracts: allFilePaths.some((name) => name.startsWith('contracts/')),
            }
            const productSurfaces = Object.values(touches).filter(Boolean).length

            const dependsOnMatch = body.match(/Depends on PR[：:]\s*(.+)/i)
            const dependsOnRaw = dependsOnMatch?.[1]?.trim()
            const dependsOnNone = dependsOnRaw?.toLowerCase() === 'none'
            const dependsOnPrMatch = dependsOnRaw?.match(/^#(\d+)$/)
            const backendContractYes = /Backend contract already in develop:[\s\S]*?- \[[xX]\] yes/i.test(body)
            const backendContractNo = /Backend contract already in develop:[\s\S]*?- \[[xX]\] no/i.test(body)
            const dependencyBlocked =
              titlePrefix === '[frontend]' &&
              Boolean(dependsOnPrMatch) &&
              backendContractNo &&
              !backendContractYes

            const releaseBodyValid =
              titlePrefix === '[release]' &&
              (body.includes('Source of truth：') || body.includes('Source of truth:')) &&
              Boolean(dependsOnRaw) &&
              (dependsOnNone || Boolean(dependsOnPrMatch)) &&
              body.includes('本 PR 明確不做') &&
              backendContractYes &&
              !backendContractNo

            const standardBodyValid =
              Boolean(titlePrefix) &&
              titlePrefix !== '[release]' &&
              /#\d+/.test(body) &&
              (body.includes('Source of truth：') || body.includes('Source of truth:')) &&
              Boolean(dependsOnRaw) &&
              (dependsOnNone || Boolean(dependsOnPrMatch)) &&
              (backendContractYes !== backendContractNo) &&
              body.includes('本 PR 明確不做')

            const runCi =
              (isReleasePromotionPr && releaseBodyValid) ||
              standardBodyValid &&
              !isDocsTemplateOrMetadataOnly &&
              (isReleasePromotionPr || filenames.length <= hardMaxChangedFiles) &&
              (isReleasePromotionPr || diffLines <= hardMaxDiffLines) &&
              (isReleasePromotionPr || productSurfaces <= 1) &&
              (isReleasePromotionPr || !(titlePrefix === '[backend]' && (touches.dashboard || touches.tachimint))) &&
              (isReleasePromotionPr || !(titlePrefix === '[frontend]' && touches.backend)) &&
              (isReleasePromotionPr || !(titlePrefix === '[contract]' && (touches.backend || touches.dashboard || touches.tachimint))) &&
              !dependencyBlocked

            const backendIntegrationPaths = [
              /^backend\//,
              /^contracts\//,
              /^docker-compose(?:\..+)?\.ya?ml$/,
              /^\.github\/workflows\/ci\.yml$/,
            ]
            const runBackendIntegration = allFilePaths.some((name) =>
              backendIntegrationPaths.some((pattern) => pattern.test(name)),
            )

            core.setOutput('run_ci', runCi ? 'true' : 'false')
            core.setOutput('run_backend_integration', runBackendIntegration ? 'true' : 'false')
            if (isDocsTemplateOrMetadataOnly) {
              core.notice('Skipping heavy product CI because this PR only changes docs/templates/metadata.')
            } else if (!runCi) {
              core.notice('Skipping heavy CI because this PR does not currently pass scope rules.')
            }
            if (runCi && !runBackendIntegration) {
              core.notice('Skipping backend integration tests because this PR does not touch backend, contracts, docker compose, or CI workflow files.')
            }

  check-cache-wiring:
    timeout-minutes: 5
    name: Check backend CI cache wiring
    needs: [scope-gate]
    if: github.event_name == 'push' || needs.scope-gate.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker Buildx cache configuration
        run: bash scripts/check-backend-ci-cache.sh

  workflow-regression:
    timeout-minutes: 5
    name: Workflow regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Verify CI workflow assertions
        run: node --test .github/workflows/ci.test.mjs

  commit-message-regression:
    timeout-minutes: 5
    name: Commit message regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify commit message hook assertions
        run: bash scripts/commit-message-check.test.sh

  pr-commit-messages:
    timeout-minutes: 5
    name: PR commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR commit messages
        run: bash scripts/check-pr-commit-messages.sh "origin/${{ github.base_ref }}" "${{ github.event.pull_request.head.sha }}"

  backend-build:
    timeout-minutes: 15
    name: Build backend image
    needs: [scope-gate]
    if: github.event_name == 'push' || needs.scope-gate.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: dev
          load: true
          tags: tachigo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend:
    timeout-minutes: 10
    name: Backend tests
    needs: [scope-gate, backend-build]
    if: github.event_name == 'push' || needs.scope-gate.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore backend image from cache
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: dev
          load: true
          tags: tachigo-app:latest
          cache-from: type=gha

      - name: Run tests
        run: docker compose run --pull never --no-deps --rm app go test ./...

      - name: Run vet
        run: docker compose run --pull never --no-deps --rm app go vet ./...

  backend-integration:
    timeout-minutes: 20
    name: Backend integration tests
    needs: [scope-gate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (needs.scope-gate.outputs.run_ci == 'true' && needs.scope-gate.outputs.run_backend_integration == 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - name: Run integration tests
        working-directory: backend
        run: go test -tags integration -v ./... -count=1

  frontend:
    timeout-minutes: 15
    name: Frontend build
    needs: [scope-gate]
    if: github.event_name == 'push' || needs.scope-gate.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build image
        run: docker compose build frontend

      - name: Lint
        run: docker compose run --no-deps --rm frontend pnpm lint

      - name: Test
        run: docker compose run --no-deps --rm frontend pnpm test

      - name: Build
        run: docker compose run --no-deps --rm frontend pnpm build

  dashboard:
    timeout-minutes: 15
    name: Dashboard build
    needs: [scope-gate]
    if: github.event_name == 'push' || needs.scope-gate.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build dashboard

      - name: Lint
        run: docker compose run --no-deps --rm dashboard pnpm lint

      - name: Test
        run: docker compose run --no-deps --rm dashboard pnpm test

      - name: Build
        run: docker compose run --no-deps --rm dashboard pnpm build

  contracts:
    timeout-minutes: 20
    name: Contracts build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        working-directory: contracts
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 --no-git

      - name: Build
        working-directory: contracts
        run: forge build

      - name: Test
        working-directory: contracts
        run: forge test

  backend-ci:
    timeout-minutes: 5
    name: Backend CI (gate)
    needs: [backend-build, backend, backend-integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check backend CI status
        env:
          BACKEND_BUILD_RESULT: ${{ needs.backend-build.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          BACKEND_INTEGRATION_RESULT: ${{ needs.backend-integration.result }}
        run: |
          for item in \
            "backend-build:$BACKEND_BUILD_RESULT" \
            "backend:$BACKEND_RESULT" \
            "backend-integration:$BACKEND_INTEGRATION_RESULT"
          do
            job="${item%%:*}"
            result="${item#*:}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "❌ $job: $result"
              exit 1
            fi
          done
          echo "✓ Backend CI passed"

  notify-discord:
    timeout-minutes: 5
    name: Notify Discord on failure
    needs: [workflow-regression, commit-message-regression, check-cache-wiring, backend-ci, frontend, dashboard, contracts]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          curl -X POST "${{ secrets.DISCORD_CI_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"CI failed on \`${{ github.ref_name }}\` (${{ github.event_name }})\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
