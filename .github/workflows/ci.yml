name: CI

on:
  push:
    branches: [main, develop]
  workflow_run:
    workflows: ["PR Scope Police"]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend tests
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build image
        run: docker compose build app

      - name: Run tests
        run: docker compose run --no-deps --rm app go test ./...

  frontend:
    name: Frontend build
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build image
        run: docker compose build frontend

      - name: Lint
        run: docker compose run --no-deps --rm frontend pnpm lint

      - name: Build
        run: docker compose run --no-deps --rm frontend pnpm build

  dashboard:
    name: Dashboard build
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build image
        run: docker compose build dashboard

      - name: Lint
        run: docker compose run --no-deps --rm dashboard pnpm lint

      - name: Build
        run: docker compose run --no-deps --rm dashboard pnpm build
