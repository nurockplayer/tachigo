name: Auto-ready draft PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main, develop]
  check_suite:
    types: [completed]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: auto-ready-pr-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  checks: read
  statuses: read
  pull-requests: write

jobs:
  auto-ready:
    name: Mark draft PR ready when checks pass
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mark eligible draft PRs ready
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const autoReadyLabel = 'auto-ready'
            const targetBaseBranches = new Set(['main', 'develop'])
            const successConclusions = new Set(['success', 'neutral', 'skipped'])
            const ownCheckNames = new Set([
              'Auto-ready draft PR',
              'Mark draft PR ready when checks pass',
            ])
            const requiredCheckSnapshots = {
              develop: [
                { context: 'Scope gate', appId: 15368 },
                { context: 'Frontend build', appId: 15368 },
                { context: 'Dashboard build', appId: 15368 },
                { context: 'Contracts build', appId: 15368 },
                { context: 'Backend CI (gate)', appId: 15368 },
              ],
              main: [
                { context: 'Scope police', appId: 15368 },
              ],
            }

            const hasAutoReadyLabel = (pr) =>
              (pr.labels || []).some((label) => label.name === autoReadyLabel)

            const isEligibleDraftPr = (pr) => {
              if (!targetBaseBranches.has(pr.base?.ref)) return false
              if (pr.draft !== true) return false
              if (pr.user?.login === 'dependabot[bot]') return false
              if (!hasAutoReadyLabel(pr)) return false
              return true
            }

            const listPrsForEvent = async () => {
              if (context.eventName === 'pull_request') {
                return [context.payload.pull_request]
              }

              if (context.eventName === 'check_suite') {
                const headSha = context.payload.check_suite?.head_sha
                if (!headSha) return []
                const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: headSha,
                })
                return response.data
              }

              return github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                per_page: 100,
              })
            }

            const requiredCheckKey = (contextName, appId) =>
              appId ? `check:${contextName}:${appId}` : `context:${contextName}`

            const requiredCheckLabel = (check) =>
              check.appId ? `${check.context} from app ${check.appId}` : check.context

            const getRequiredChecks = (baseBranch) => requiredCheckSnapshots[baseBranch] || []

            const listCheckRuns = async (headSha) =>
              github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              })

            const listStatuses = async (headSha) => {
              const response = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: headSha,
              })
              return response.data.statuses || []
            }

            const checkRunPassed = (run, allowedConclusions) =>
              run.status === 'completed' && allowedConclusions.has(run.conclusion)

            const statusPassed = (status) => status.state === 'success'

            const checkNameCandidates = (run) => [run.name]

            const observedAt = (item) =>
              Date.parse(item.completed_at || item.updated_at || item.created_at || item.started_at || '') || 0

            const recordObservedContext = (observed, key, passed, item) => {
              const timestamp = observedAt(item)
              const previous = observed.get(key)
              if (!previous || timestamp >= previous.timestamp) {
                observed.set(key, { passed, timestamp })
              }
            }

            const buildObservedContexts = (checkRuns, statuses) => {
              const observed = new Map()

              for (const status of statuses) {
                recordObservedContext(
                  observed,
                  requiredCheckKey(status.context, null),
                  statusPassed(status),
                  status,
                )
              }

              for (const run of checkRuns) {
                if (ownCheckNames.has(run.name)) continue
                for (const name of checkNameCandidates(run)) {
                  const passed = checkRunPassed(run, successConclusions)
                  const legacyKey = requiredCheckKey(name, null)
                  const appKey = requiredCheckKey(name, run.app?.id)
                  recordObservedContext(observed, legacyKey, passed, run)
                  if (run.app?.id) {
                    recordObservedContext(observed, appKey, passed, run)
                  }
                }
              }

              return observed
            }

            const requiredChecksPassed = (requiredChecks, observed) => {
              for (const requiredCheck of requiredChecks) {
                if (ownCheckNames.has(requiredCheck.context)) continue
                if (observed.get(requiredCheckKey(requiredCheck.context, requiredCheck.appId))?.passed !== true) {
                  core.info(`Required context is not successful yet: ${requiredCheckLabel(requiredCheck)}`)
                  return false
                }
              }
              return true
            }

            const readyForReview = async (pr) => {
              const mutation = `
                mutation($pullRequestId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                    pullRequest {
                      number
                      isDraft
                    }
                  }
                }
              `
              await github.graphql(mutation, { pullRequestId: pr.node_id })
            }

            const prs = await listPrsForEvent()
            const seen = new Set()

            for (const pr of prs) {
              if (seen.has(pr.number)) continue
              seen.add(pr.number)

              if (!isEligibleDraftPr(pr)) {
                core.info(`Skipping PR #${pr.number}: not an eligible ${autoReadyLabel} draft PR.`)
                continue
              }

              const headSha = pr.head?.sha
              if (!headSha) {
                core.info(`Skipping PR #${pr.number}: missing head SHA.`)
                continue
              }

              const requiredChecks = getRequiredChecks(pr.base.ref)
              if (requiredChecks.length === 0) {
                core.warning(`Skipping PR #${pr.number}: no required-check snapshot for base ${pr.base.ref}.`)
                continue
              }

              let checkRuns = []
              let statuses = []
              try {
                const fetchedChecks = await Promise.all([
                  listCheckRuns(headSha),
                  listStatuses(headSha),
                ])
                checkRuns = fetchedChecks[0]
                statuses = fetchedChecks[1]
              } catch (error) {
                core.warning(
                  `Skipping PR #${pr.number} at ${headSha}: failed to fetch checks/statuses (${error?.message || error}).`,
                )
                continue
              }

              const observed = buildObservedContexts(checkRuns, statuses)
              const passed = requiredChecksPassed(requiredChecks, observed)

              if (!passed) {
                core.info(`PR #${pr.number} remains draft until checks pass.`)
                continue
              }

              await readyForReview(pr)
              core.notice(`PR #${pr.number} marked ready for review.`)
            }
