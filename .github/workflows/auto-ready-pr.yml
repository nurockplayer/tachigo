name: Auto-ready draft PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main, develop]
  check_suite:
    types: [completed]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: auto-ready-pr-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: write

jobs:
  auto-ready:
    name: Mark draft PR ready when checks pass
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mark eligible draft PRs ready
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const autoReadyLabel = 'auto-ready'
            const targetBaseBranches = new Set(['main', 'develop'])
            const successConclusions = new Set(['success', 'neutral', 'skipped'])
            const ownCheckNames = new Set([
              'Auto-ready draft PR',
              'Mark draft PR ready when checks pass',
            ])

            const hasAutoReadyLabel = (pr) =>
              (pr.labels || []).some((label) => label.name === autoReadyLabel)

            const isEligibleDraftPr = (pr) => {
              if (!targetBaseBranches.has(pr.base?.ref)) return false
              if (pr.draft !== true) return false
              if (pr.user?.login === 'dependabot[bot]') return false
              if (!hasAutoReadyLabel(pr)) return false
              return true
            }

            const listPrsForEvent = async () => {
              if (context.eventName === 'pull_request') {
                return [context.payload.pull_request]
              }

              if (context.eventName === 'check_suite') {
                const headSha = context.payload.check_suite?.head_sha
                if (!headSha) return []
                const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: headSha,
                })
                return response.data
              }

              return github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                per_page: 100,
              })
            }

            const requiredCheckKey = (contextName, appId) =>
              appId ? `check:${contextName}:${appId}` : `context:${contextName}`

            const requiredCheckLabel = (check) =>
              check.appId ? `${check.context} from app ${check.appId}` : check.context

            const getRequiredChecks = async (baseBranch) => {
              const query = `
                query($owner: String!, $repo: String!, $baseBranch: String!) {
                  repository(owner: $owner, name: $repo) {
                    ref(qualifiedName: $baseBranch) {
                      branchProtectionRule {
                        requiredStatusCheckContexts
                        requiredStatusChecks {
                          context
                          app {
                            databaseId
                          }
                        }
                      }
                    }
                  }
                }
              `
              const response = await github.graphql(query, { owner, repo, baseBranch })
              const requiredStatusChecks =
                response.repository?.ref?.branchProtectionRule?.requiredStatusChecks || []
              const requiredStatusCheckContexts =
                response.repository?.ref?.branchProtectionRule?.requiredStatusCheckContexts || []
              const requiredChecks = []
              const seen = new Set()

              for (const check of requiredStatusChecks) {
                if (!check.context) continue
                const requiredCheck = {
                  context: check.context,
                  appId: check.app?.databaseId || null,
                }
                const key = requiredCheckKey(requiredCheck.context, requiredCheck.appId)
                if (seen.has(key)) continue
                seen.add(key)
                requiredChecks.push(requiredCheck)
              }

              for (const contextName of requiredStatusCheckContexts) {
                const key = requiredCheckKey(contextName, null)
                if (seen.has(key)) continue
                seen.add(key)
                requiredChecks.push({ context: contextName, appId: null })
              }

              return requiredChecks
            }

            const listCheckRuns = async (headSha) =>
              github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              })

            const listStatuses = async (headSha) => {
              const response = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: headSha,
              })
              return response.data.statuses || []
            }

            const checkRunPassed = (run, allowedConclusions) =>
              run.status === 'completed' && allowedConclusions.has(run.conclusion)

            const statusPassed = (status) => status.state === 'success'

            const checkNameCandidates = (run) => [run.name]

            const recordObservedContext = (observed, key, passed) => {
              observed.set(key, (observed.get(key) ?? true) && passed)
            }

            const buildObservedContexts = (checkRuns, statuses) => {
              const observed = new Map()

              for (const status of statuses) {
                recordObservedContext(
                  observed,
                  requiredCheckKey(status.context, null),
                  statusPassed(status),
                )
              }

              for (const run of checkRuns) {
                if (ownCheckNames.has(run.name)) continue
                for (const name of checkNameCandidates(run)) {
                  const passed = checkRunPassed(run, successConclusions)
                  const legacyKey = requiredCheckKey(name, null)
                  const appKey = requiredCheckKey(name, run.app?.id)
                  recordObservedContext(observed, legacyKey, passed)
                  if (run.app?.id) {
                    recordObservedContext(observed, appKey, passed)
                  }
                }
              }

              return observed
            }

            const requiredChecksPassed = (requiredChecks, observed) => {
              for (const requiredCheck of requiredChecks) {
                if (ownCheckNames.has(requiredCheck.context)) continue
                if (observed.get(requiredCheckKey(requiredCheck.context, requiredCheck.appId)) !== true) {
                  core.info(`Required context is not successful yet: ${requiredCheckLabel(requiredCheck)}`)
                  return false
                }
              }
              return true
            }

            const fallbackChecksPassed = (checkRuns, statuses) => {
              const visibleRuns = checkRuns.filter((run) => !ownCheckNames.has(run.name))
              if (visibleRuns.length === 0 && statuses.length === 0) {
                core.info('No visible checks found yet.')
                return false
              }

              const checksComplete = visibleRuns.every((run) =>
                checkRunPassed(run, successConclusions),
              )
              const statusesComplete = statuses.every(statusPassed)
              if (!checksComplete || !statusesComplete) {
                core.info('At least one visible check or status is not successful yet.')
              }
              return checksComplete && statusesComplete
            }

            const readyForReview = async (pr) => {
              const mutation = `
                mutation($pullRequestId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                    pullRequest {
                      number
                      isDraft
                    }
                  }
                }
              `
              await github.graphql(mutation, { pullRequestId: pr.node_id })
            }

            const prs = await listPrsForEvent()
            const seen = new Set()

            for (const pr of prs) {
              if (seen.has(pr.number)) continue
              seen.add(pr.number)

              if (!isEligibleDraftPr(pr)) {
                core.info(`Skipping PR #${pr.number}: not an eligible ${autoReadyLabel} draft PR.`)
                continue
              }

              const headSha = pr.head?.sha
              if (!headSha) {
                core.info(`Skipping PR #${pr.number}: missing head SHA.`)
                continue
              }

              let requiredChecks = []
              let checkRuns = []
              let statuses = []
              try {
                const fetchedChecks = await Promise.all([
                  getRequiredChecks(pr.base.ref),
                  listCheckRuns(headSha),
                  listStatuses(headSha),
                ])
                requiredChecks = fetchedChecks[0]
                checkRuns = fetchedChecks[1]
                statuses = fetchedChecks[2]
              } catch (error) {
                core.warning(
                  `Skipping PR #${pr.number} at ${headSha}: failed to fetch checks/statuses (${error?.message || error}).`,
                )
                continue
              }

              const observed = buildObservedContexts(checkRuns, statuses)
              const passed = requiredChecks.length > 0
                ? requiredChecksPassed(requiredChecks, observed)
                : fallbackChecksPassed(checkRuns, statuses)

              if (!passed) {
                core.info(`PR #${pr.number} remains draft until checks pass.`)
                continue
              }

              await readyForReview(pr)
              core.notice(`PR #${pr.number} marked ready for review.`)
            }
