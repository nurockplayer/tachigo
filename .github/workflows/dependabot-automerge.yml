name: Dependabot Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 安全性更新：直接 auto-merge
      - name: Auto-merge security updates
        if: contains(github.event.pull_request.labels.*.name, 'security')
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      # devDependency patch/minor，但排除 typescript 和 @types/*
      - name: Auto-merge devDependency patch/minor
        if: |
          !contains(github.event.pull_request.labels.*.name, 'security') &&
          steps.meta.outputs.dependency-type == 'direct:development' &&
          (steps.meta.outputs.update-type == 'version-update:semver-patch' ||
           steps.meta.outputs.update-type == 'version-update:semver-minor') &&
          !contains(steps.meta.outputs.dependency-names, 'typescript') &&
          !contains(steps.meta.outputs.dependency-names, '@types/')
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      # major update、production dependency、或敏感套件：不動，等人工處理
