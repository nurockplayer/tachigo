name: Dependabot Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if not Dependabot
        if: github.actor != 'dependabot[bot]'
        run: echo "Not a Dependabot PR, skipping."

      - name: Fetch Dependabot metadata
        if: github.actor == 'dependabot[bot]'
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide auto-merge policy
        if: github.actor == 'dependabot[bot]'
        id: policy
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          DEPENDENCY_TYPE: ${{ steps.meta.outputs.dependency-type }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          DEPENDENCY_NAMES: ${{ steps.meta.outputs.dependency-names }}
        run: |
          auto_merge=false
          reason="manual review required"

          if [[ ",$LABELS," == *",safe-to-automerge,"* ]]; then
            auto_merge=true
            reason="manual override label: safe-to-automerge"
          elif [[ "$DEPENDENCY_TYPE" != "direct:development" ]]; then
            reason="production dependency requires manual review"
          elif [[ ",$LABELS," == *",security,"* ]]; then
            auto_merge=true
            reason="security update"
          elif [[ "$DEPENDENCY_TYPE" == "direct:development" ]] && \
               [[ "$UPDATE_TYPE" == "version-update:semver-patch" || "$UPDATE_TYPE" == "version-update:semver-minor" ]] && \
               [[ "$DEPENDENCY_NAMES" != *"typescript"* ]] && \
               [[ "$DEPENDENCY_NAMES" != *"@types/"* ]] && \
               [[ "$DEPENDENCY_NAMES" != *"vite"* ]] && \
               [[ "$DEPENDENCY_NAMES" != *"react"* ]] && \
               [[ "$DEPENDENCY_NAMES" != *"react-dom"* ]] && \
               [[ "$DEPENDENCY_NAMES" != *"eslint"* ]]; then
            auto_merge=true
            reason="safe devDependency patch/minor update"
          else
            if [[ "$UPDATE_TYPE" != "version-update:semver-patch" && "$UPDATE_TYPE" != "version-update:semver-minor" ]]; then
              reason="major or unsupported update type"
            elif [[ "$DEPENDENCY_NAMES" == *"typescript"* ]]; then
              reason="typescript update requires manual review"
            elif [[ "$DEPENDENCY_NAMES" == *"@types/"* ]]; then
              reason="@types/* update requires manual review"
            elif [[ "$DEPENDENCY_NAMES" == *"vite"* ]]; then
              reason="vite update requires manual review"
            elif [[ "$DEPENDENCY_NAMES" == *"react"* || "$DEPENDENCY_NAMES" == *"react-dom"* ]]; then
              reason="react runtime update requires manual review"
            elif [[ "$DEPENDENCY_NAMES" == *"eslint"* ]]; then
              reason="eslint/tooling update requires manual review"
            fi
          fi

          echo "auto_merge=$auto_merge" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Print auto-merge decision
        if: github.actor == 'dependabot[bot]'
        run: |
          echo "dependency_type=${{ steps.meta.outputs.dependency-type }}"
          echo "update_type=${{ steps.meta.outputs.update-type }}"
          echo "dependency_names=${{ steps.meta.outputs.dependency-names }}"
          echo "auto_merge=${{ steps.policy.outputs.auto_merge }}"
          echo "reason=${{ steps.policy.outputs.reason }}"

      - name: Enable auto-merge
        if: github.actor == 'dependabot[bot]' && steps.policy.outputs.auto_merge == 'true'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Skip auto-merge
        if: github.actor == 'dependabot[bot]' && steps.policy.outputs.auto_merge != 'true'
        run: echo "Skipping auto-merge ${{ steps.policy.outputs.reason }}"
