name: PR Scope Police

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scope-police:
    name: Scope police
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate PR scope
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            if (!pr) {
              core.setFailed('pull_request payload is required')
              return
            }

            const isSameRepoHead =
              pr.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`
            const isReleasePromotionPr =
              isSameRepoHead &&
              pr.base?.ref === 'main' &&
              pr.head?.ref === 'develop'
            const isDependabotPr = pr.user?.login === 'dependabot[bot]'

            const bypassLabels = new Set(['scope-exception'])
            const labels = (pr.labels || []).map((label) => label.name)
            const bypassed = labels.some((label) => bypassLabels.has(label))

            const autonomousLabels = new Set(['codex', 'codex-automation', 'auto-ready'])
            const bodyForAutonomousGate = (pr.body || '').replace(/<!--[\s\S]*?-->/g, '')
            const isAutonomousPr =
              labels.some((label) => autonomousLabels.has(label)) ||
              /(?:^|\n)\s*##\s*Delegation Execution Log\b/i.test(bodyForAutonomousGate)
            const hasDelegationExecutionLog = /(?:^|\n)\s*##\s*Delegation Execution Log\b/i.test(bodyForAutonomousGate)
            const workerProfiles = [
              'controller',
              'ops_spark',
              'repo_scout',
              'docs_worker',
              'test_worker',
              'backend_worker',
              'frontend_worker',
              'schema_worker',
              'review_worker',
            ]
            const hasExplicitWorkerProfile = workerProfiles.some((profile) =>
              new RegExp(`(?:^|[^A-Za-z0-9_])${profile}(?:$|[^A-Za-z0-9_])`, 'i').test(bodyForAutonomousGate),
            )
            const hasMeaningfulExceptionReason = (value) =>
              Boolean(value?.trim()) && !/^(?:n\/a|none|無|不適用)$/i.test(value.trim())
            const trivialExceptionReasonMatch = bodyForAutonomousGate.match(
              /(?:^|\n)\s*-\s*(?:Trivial\/self-only exception reason|Self-only exception reason|Trivial exception reason)\s*[：:]\s*(.+)/i,
            )
            const selfReviewExceptionReasonMatch = bodyForAutonomousGate.match(
              /(?:^|\n)\s*-\s*Self-review\s*\/\s*exception reason\s*[：:]\s*(.+)/i,
            )
            const selfReviewExceptionReason = selfReviewExceptionReasonMatch?.[1]?.trim()
            const hasExplicitSelfReviewExceptionReason =
              hasMeaningfulExceptionReason(selfReviewExceptionReason) &&
              /\b(?:trivial|self-only)\b/i.test(selfReviewExceptionReason)
            const hasTrivialExceptionReason =
              hasMeaningfulExceptionReason(trivialExceptionReasonMatch?.[1]) || hasExplicitSelfReviewExceptionReason

            const hardMaxChangedFiles = 35
            const hardMaxDiffLines = 1000
            const warningDiffLines = 600
            const autoCloseLabel = 'scope-violation'
            const dependencyLabel = 'blocked-by-dependency'
            const owner = context.repo.owner
            const repo = context.repo.repo

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            })

            const filenames = files.map((file) => file.filename)
            const allFilePaths = files.flatMap((f) =>
              f.status === 'renamed' && f.previous_filename ? [f.filename, f.previous_filename] : [f.filename]
            )
            const diffLines = files.reduce((sum, file) => sum + file.additions + file.deletions, 0)
            const isDocsOrTemplatePath = (name) =>
              name.startsWith('docs/') ||
              name.startsWith('docs/ai/') ||
              name.startsWith('plans/') ||
              name.startsWith('.github/ISSUE_TEMPLATE/') ||
              name === '.github/PULL_REQUEST_TEMPLATE.md' ||
              /^[^/]+\.md$/i.test(name)
            const isNonProductMetadataPath = (name) =>
              isDocsOrTemplatePath(name) ||
              name.startsWith('infra/') ||
              name === '.gitignore' ||
              name === '.gitattributes'
            const isDocsTemplateOrMetadataOnly =
              allFilePaths.length > 0 && allFilePaths.every(isNonProductMetadataPath)

            const touches = {
              backend: allFilePaths.some((name) =>
                name.startsWith('backend/') || name.startsWith('services/api/'),
              ),
              frontend: allFilePaths.some((name) =>
                name.startsWith('dashboard/') ||
                name.startsWith('tachimint/') ||
                name.startsWith('apps/dashboard/') ||
                name.startsWith('apps/extension/'),
              ),
              contracts: allFilePaths.some((name) => name.startsWith('contracts/')),
              docs: allFilePaths.some((name) => name.startsWith('docs/') || name.startsWith('plans/')),
              packages: allFilePaths.some((name) => name.startsWith('packages/')),
            }

            const productSurfaces = Object.entries({
              backend: touches.backend,
              frontend: touches.frontend,
              contracts: touches.contracts,
            })
              .filter(([, touched]) => touched)
              .map(([name]) => name)

            const body = pr.body || ''
            const title = pr.title || ''
            const failures = []
            const policyFailures = []
            const dependencyFailures = []
            const severeFailures = []
            const warnings = []

            const allowedPrefixes = ['[backend]', '[frontend]', '[contract]', '[discussion]', '[release]', '[infra]', '[chore]']
            const titlePrefix = allowedPrefixes.find((prefix) => title.startsWith(prefix))
            const isInfraOrChore = titlePrefix === '[infra]' || titlePrefix === '[chore]'
            const hasSourceOfTruth = /(?:^|\n)\s*-?\s*Source of truth\s*[：:]/i.test(body)
            const hasExplicitNonGoals = body.includes('本 PR 明確不做')
            const dependsOnMatch = body.match(/(?:^|\n)\s*-?\s*Depends on PR\s*[：:]\s*(.+)/i)
            const dependsOnRaw = dependsOnMatch?.[1]?.trim()
            const dependsOnNone = dependsOnRaw?.toLowerCase() === 'none'
            const dependsOnPrMatch = dependsOnRaw?.match(/^#(\d+)$/)
            const backendContractYes = /Backend contract already in develop\s*[：:][\s\S]*?- \[[xX]\] yes/i.test(body)
            const backendContractNo = /Backend contract already in develop\s*[：:][\s\S]*?- \[[xX]\] no/i.test(body)
            const stackedOnDependency = /If no, this PR is:[\s\S]*?- \[[xX]\] stacked on dependency branch/i.test(body)
            const intentionallyBlocked = /If no, this PR is:[\s\S]*?- \[[xX]\] intentionally blocked until dependency merges/i.test(body)

            if (!isDependabotPr) {
              if (isAutonomousPr) {
                if (!hasDelegationExecutionLog) {
                  policyFailures.push('Autonomous PR must include a `Delegation Execution Log` section.')
                }

                if (!hasExplicitWorkerProfile && !hasTrivialExceptionReason) {
                  policyFailures.push(
                    'Autonomous PR must name at least one explicit worker profile or provide a trivial/self-only exception reason.',
                  )
                }
              }

              if (bypassed) {
                core.notice('Scope checks bypassed by scope-exception label; autonomous delegation gate still enforced.')
              }

              if (!bypassed) {
              if (!titlePrefix) {
                policyFailures.push(
                  `PR title must start with one of: ${allowedPrefixes.join(', ')}. Current title: "${title}".`,
                )
              }

              if (isReleasePromotionPr && titlePrefix !== '[release]') {
                policyFailures.push('`develop -> main` release PR must use the `[release]` title prefix.')
              }

              if (!isReleasePromotionPr && titlePrefix === '[release]') {
                policyFailures.push('`[release]` PR is reserved for formal `develop -> main` promotion PRs only.')
              }

              if (!isReleasePromotionPr && !isInfraOrChore && !/#\d+/.test(body)) {
                policyFailures.push('PR body must reference at least one issue or PR number such as `#123`.')
              }

              if (!isInfraOrChore && !hasSourceOfTruth) {
                policyFailures.push('PR body must include a `Source of truth` line in the Scope 對齊 section.')
              }

              if (!isInfraOrChore && !hasExplicitNonGoals) {
                policyFailures.push('PR body must include a `本 PR 明確不做` section.')
              }

              if (!isInfraOrChore && !dependsOnRaw) {
                policyFailures.push('PR body must include a `Depends on PR` line with `none` or `#123`.')
              }

              if (!isInfraOrChore && dependsOnRaw && !dependsOnNone && !dependsOnPrMatch) {
                policyFailures.push('`Depends on PR` must be `none` or a single PR number such as `#123`.')
              }

              if (!isInfraOrChore && !isDocsTemplateOrMetadataOnly) {
                if (!backendContractYes && !backendContractNo) {
                  policyFailures.push('PR body must mark whether the backend contract is already in `develop`.')
                }
                if (backendContractYes && backendContractNo) {
                  policyFailures.push('`Backend contract already in develop` cannot select both yes and no.')
                }
                if (isReleasePromotionPr && !backendContractYes) {
                  policyFailures.push('Formal `[release]` PR must mark `Backend contract already in develop` as yes.')
                }

                if (backendContractNo && !stackedOnDependency && !intentionallyBlocked) {
                  policyFailures.push(
                    'When backend contract is not yet in `develop`, PR body must mark this PR as stacked or intentionally blocked.',
                  )
                }
              }
              }
            }

            if (!bypassed && titlePrefix === '[frontend]' && dependsOnPrMatch && backendContractNo) {
              const depNumber = parseInt(dependsOnPrMatch[1], 10)
              let depState = 'unknown'
              try {
                const depPr = await github.rest.pulls.get({ owner, repo, pull_number: depNumber })
                depState = depPr.data.state
              } catch (error) {
                if (error.status !== 404) throw error
              }

              const message = stackedOnDependency
                ? `This frontend PR depends on #${depNumber}, but the backend contract is not yet in develop. Keep it stacked on the dependency branch and do not merge until #${depNumber} lands. Dependency PR state: ${depState}.`
                : `This frontend PR depends on #${depNumber}, but the backend contract is not yet in develop. Wait for #${depNumber} to merge, then re-stack from latest develop. Dependency PR state: ${depState}.`
              dependencyFailures.push(message)
            }

            if (!isDependabotPr && !bypassed) {
              if (!isReleasePromotionPr && filenames.length > hardMaxChangedFiles) {
                const message =
                  `PR changes ${filenames.length} files, which exceeds the hard limit of ${hardMaxChangedFiles}. Split the PR before review.`
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && diffLines > warningDiffLines && diffLines <= hardMaxDiffLines) {
                const message =
                  `PR diff size is ${diffLines} lines (+/-), which exceeds the soft limit of ${warningDiffLines}. Consider splitting this PR for easier review.`
                warnings.push(message)
              }

              if (!isReleasePromotionPr && diffLines > hardMaxDiffLines) {
                const message =
                  `PR diff size is ${diffLines} lines (+/-), which exceeds the hard limit of ${hardMaxDiffLines}. Split the PR before review. (Use \`scope-exception\` label only for maintainer-approved changes that truly cannot be split; it fully bypasses this workflow.)`
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && productSurfaces.length > 1) {
                const message =
                  `PR touches multiple product surfaces (${productSurfaces.join(', ')}). Keep one PR to one surface only.`
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && titlePrefix === '[backend]' && touches.frontend) {
                const message = '[backend] PR must not change frontend surfaces such as dashboard/, tachimint/, apps/dashboard/, or apps/extension/.'
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && titlePrefix === '[frontend]' && touches.backend) {
                const message =
                  '[frontend] PR must not change backend/service API files. Move backend prerequisites into a separate PR.'
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && titlePrefix === '[contract]' && (touches.backend || touches.frontend)) {
                const message = '[contract] PR must not change backend/service API or frontend surfaces.'
                failures.push(message)
                severeFailures.push(message)
              }
            }

            if (!bypassed && titlePrefix === '[discussion]' && productSurfaces.length > 0) {
              warnings.push(
                '[discussion] PR is changing product code. Consider moving implementation work to a feature PR.',
              )
            }

            failures.push(...policyFailures, ...dependencyFailures)

            const commentHeader = '<!-- pr-scope-police -->'
            const summaryLines = [
              commentHeader,
              '## PR Scope Police',
              '',
            ]

            if (failures.length === 0) {
              summaryLines.push('- PASS: scope checks passed.')
            } else {
              summaryLines.push('- FAIL: this PR is blocked by policy, dependency, or scope issues.')

              if (policyFailures.length > 0) {
                summaryLines.push('')
                summaryLines.push('### Policy issues')
                for (const failure of policyFailures) {
                  summaryLines.push(`- ${failure}`)
                }
              }

              if (dependencyFailures.length > 0) {
                summaryLines.push('')
                summaryLines.push('### Dependency blocks')
                for (const failure of dependencyFailures) {
                  summaryLines.push(`- ${failure}`)
                }
              }

              if (failures.length > policyFailures.length + dependencyFailures.length) {
                summaryLines.push('')
                summaryLines.push('### Scope violations')
                for (const failure of severeFailures) {
                  summaryLines.push(`- ${failure}`)
                }
              }
            }

            if (warnings.length > 0) {
              summaryLines.push('')
              summaryLines.push('### Warnings')
              for (const warning of warnings) {
                summaryLines.push(`- ${warning}`)
              }
            }

            if (isDependabotPr) {
              summaryLines.push('')
              summaryLines.push('### Dependabot Mode')
              summaryLines.push('- Template policy checks are skipped for Dependabot maintenance PRs.')
              summaryLines.push('- Scope and size checks still apply.')
              summaryLines.push('- Dependency gate is not evaluated for Dependabot PRs.')
            }

            if (isDocsTemplateOrMetadataOnly && !isDependabotPr) {
              summaryLines.push('')
              summaryLines.push('### Docs / Template Mode')
              summaryLines.push('- Backend contract checks are skipped for non-product docs/template/metadata PRs.')
              summaryLines.push('- Title prefix, source of truth, dependency line, explicit non-goals, size, and surface checks still apply.')
            }

            summaryLines.push('')
            summaryLines.push('### Snapshot')
            summaryLines.push(`- Mode: ${isReleasePromotionPr ? 'release promotion (develop -> main)' : 'standard PR'}`)
            summaryLines.push(`- Docs/template/metadata only: ${isDocsTemplateOrMetadataOnly ? 'yes' : 'no'}`)
            summaryLines.push(`- Changed files: ${filenames.length}`)
            summaryLines.push(`- Diff lines (+/-): ${diffLines}`)
            summaryLines.push(
              `- Product surfaces: ${productSurfaces.length > 0 ? productSurfaces.join(', ') : 'none'}`,
            )
            summaryLines.push(`- Dependency blocked: ${dependencyFailures.length > 0 ? 'yes' : 'no'}`)
            summaryLines.push(`- Autonomous PR: ${isAutonomousPr ? 'yes' : 'no'}`)
            summaryLines.push(
              `- Auto-close triggered: ${severeFailures.length > 0 ? 'yes' : 'no'}`,
            )
            summaryLines.push(`- Auto-close label: \`${autoCloseLabel}\``)
            summaryLines.push(`- Dependency block label: \`${dependencyLabel}\``)
            summaryLines.push('- Bypass label: `scope-exception`')

            const commentBody = summaryLines.join('\n')

            const existingComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            })

            const previous = existingComments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(commentHeader),
            )

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body: commentBody,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: commentBody,
              })
            }

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name })
              } catch (error) {
                if (error.status !== 404) throw error
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                })
              }
            }

            if (severeFailures.length > 0) {
              await ensureLabel(
                autoCloseLabel,
                'B60205',
                'PR was blocked by automated scope policy checks',
              )
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: [autoCloseLabel],
              })

              if (pr.state === 'open') {
                const closeReason = severeFailures.map(f => `- ${f}`).join('\n')
                const closeComment = `🚨 **Closed by scope police**\n\nThis PR has been automatically closed due to scope violations:\n\n${closeReason}\n\nPlease see the scope police comment above and [CLAUDE.md](https://github.com/${owner}/${repo}/blob/develop/CLAUDE.md) for details. Feel free to reopen once issues are resolved.`

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: closeComment,
                })

                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pr.number,
                  state: 'closed',
                })
                core.notice('PR was auto-closed due to severe scope violations.')
              }
            } else if (labels.includes(autoCloseLabel)) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pr.number,
                  name: autoCloseLabel,
                })
              } catch (error) {
                if (error.status !== 404) throw error
              }
            }

            if (dependencyFailures.length > 0) {
              await ensureLabel(
                dependencyLabel,
                '1D76DB',
                'PR is blocked by an unmerged dependency or undeployed backend contract',
              )
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: [dependencyLabel],
              })
            } else if (labels.includes(dependencyLabel)) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pr.number,
                  name: dependencyLabel,
                })
              } catch (error) {
                if (error.status !== 404) throw error
              }
            }

            if (failures.length > 0) {
              core.setFailed('PR Scope Police blocked this PR. See sticky comment for details.')
            } else {
              core.notice('PR scope police passed.')
            }
