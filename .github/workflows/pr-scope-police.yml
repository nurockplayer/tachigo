name: PR Scope Police

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scope-police:
    name: Scope police
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate PR scope
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            if (!pr) {
              core.setFailed('pull_request payload is required')
              return
            }

            const isSameRepoHead =
              pr.head?.repo?.full_name === `${context.repo.owner}/${context.repo.repo}`
            const isReleasePromotionPr =
              isSameRepoHead &&
              pr.base?.ref === 'main' &&
              pr.head?.ref === 'develop'
            const isDependabotPr = pr.user?.login === 'dependabot[bot]'

            const bypassLabels = new Set(['scope-exception'])
            const labels = (pr.labels || []).map((label) => label.name)
            const bypassed = labels.some((label) => bypassLabels.has(label))

            const autonomousLabels = new Set(['autonomous', 'codex', 'codex-automation', 'codex-workflow', 'auto-ready'])
            const bodyForAutonomousGate = (pr.body || '').replace(/<!--[\s\S]*?-->/g, '')
            const riskClassDefinitions = [
              { id: 'R0', label: 'docs / template / metadata only' },
              { id: 'R1', label: 'tests / CI / tooling only' },
              { id: 'R2', label: 'frontend behavior' },
              { id: 'R3', label: 'backend / API behavior' },
              {
                id: 'R4',
                label: 'auth / permissions / security / schema / migration / secrets / payments / wallet / workflow / release',
              },
            ]
            const extractMarkdownSection = (markdown, heading) => {
              const escapedHeading = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
              const match = markdown.match(
                new RegExp(
                  `(?:^|\\n)\\s*##\\s*${escapedHeading}\\b[^\\n]*\\n([\\s\\S]*?)(?=\\n\\s*##\\s+|\\n*$)`,
                  'i',
                ),
              )
              return match?.[1] || ''
            }
            const riskClassSection = extractMarkdownSection(bodyForAutonomousGate, 'PR Risk Class')
            const checkedRiskClassIds = Array.from(
              riskClassSection.matchAll(/^\s*-\s*\[[xX]\]\s*(R[0-4])\b/gm),
              (match) => match[1],
            )
            const checkedRiskClasses = checkedRiskClassIds
              .map((checkedId) => riskClassDefinitions.find(({ id }) => id === checkedId))
              .filter(Boolean)
            const uniqueCheckedRiskClassIds = [...new Set(checkedRiskClassIds)]
            const selectedRiskClass = checkedRiskClasses.length === 1 ? checkedRiskClasses[0] : null
            const selectedRiskClassId =
              checkedRiskClassIds.length === 0
                ? 'unclassified'
                : uniqueCheckedRiskClassIds.length === 1
                  ? uniqueCheckedRiskClassIds[0]
                  : 'invalid'
            const hasAutoReadyLabel = labels.includes('auto-ready')
            const autoReadyAllowedByRiskClass =
              checkedRiskClassIds.length === 1 && selectedRiskClassId !== 'R4'
            const delegationExecutionLogSection = extractMarkdownSection(
              bodyForAutonomousGate,
              'Delegation Execution Log',
            )
            const reviewConversationCloseoutSection = extractMarkdownSection(
              bodyForAutonomousGate,
              'Review conversation closeout',
            )
            const finalMergeGateSection = extractMarkdownSection(
              bodyForAutonomousGate,
              'Final merge gate',
            )
            const hasNoDelegationMeaning = (value) =>
              !value?.trim() || /^(?:n\/a|none|無|不適用)$/i.test(value.trim())
            const hasMeaningfulValue = (value) => !hasNoDelegationMeaning(value)
            const delegationFieldPattern =
              /^(Source issue delegation plan|Actual worker profile\(s\)|Model strength|Verification evidence|Self-review\s*\/\s*exception reason)\s*[：:]\s*(.*?)$/i
            const closeoutFieldPattern =
              /^Worker session closeout\s*[：:]\s*(.*?)$/i
            const spawnDirectiveFieldPattern =
              /^Spawn directive\(s\)\s*[：:]\s*(.*?)$/i
            const actualWorkerProfileFieldPattern =
              /^Actual worker profile\(s\)\s*[：:]\s*(.*?)$/i
            const readyToMergeFieldPattern =
              /^Ready-to-merge decision\s*[：:]\s*(.*?)$/i
            const reviewCloseoutFieldPattern =
              /^(Unresolved threads|CodeRabbit|chatgpt-codex-connector|Final reviewer action)\s*[：:]\s*(.*?)$/i
            const reviewEvidenceFieldPatterns = [
              /^review_triage_ref\s*[：:]\s*(.*?)$/i,
              /^root_cause_gate_ref\s*[：:]\s*(.*?)$/i,
              /^finding_disposition_ref\s*[：:]\s*(.*?)$/i,
            ]
            const finalMergeGateFieldPattern =
              /^(Ready-to-merge decision|Latest head SHA|Required checks|spec workflow-check evidence|Evidence URL)\s*[：:]\s*(.*?)$/i
            const hasMeaningfulExceptionReason = (value) =>
              Boolean(value?.trim()) && !/^(?:n\/a|none|無|不適用)$/i.test(value.trim())
            const hasSelfReviewTrivialExceptionReason = (value) =>
              hasMeaningfulExceptionReason(value) && /\b(?:trivial|self-only)\b/i.test(value)
            const trivialExceptionFieldPatterns = [
              {
                pattern: /^(Trivial\/self-only exception reason|Self-only exception reason|Trivial exception reason)\s*[：:]\s*(.*?)$/i,
                valueEvaluator: hasMeaningfulExceptionReason,
              },
              {
                pattern: /^Self-review\s*\/\s*exception reason\s*[：:]\s*(.*?)$/i,
                valueEvaluator: hasSelfReviewTrivialExceptionReason,
              },
            ]

            const isDelegationFieldHeader = (line) =>
              delegationFieldPattern.test(line) ||
              closeoutFieldPattern.test(line) ||
              spawnDirectiveFieldPattern.test(line)

            const hasMeaningfulDelegationValue = (lines, startIndex, fieldPattern, valueEvaluator = hasMeaningfulValue) => {
              const line = lines[startIndex]
              const normalized = line.trim().replace(/^[*-]\s*/, '').trim()
              if (!normalized) {
                return false
              }

              const headerMatch = normalized.match(fieldPattern)
              if (!headerMatch) {
                return false
              }

              const value =
                headerMatch[2] !== undefined
                  ? headerMatch[2].trim()
                  : headerMatch[1]?.trim()
              if (valueEvaluator(value)) {
                return true
              }

              for (let nestedIndex = startIndex + 1; nestedIndex < lines.length; nestedIndex += 1) {
                const rawNestedLine = lines[nestedIndex]
                const nestedTrimmed = rawNestedLine.trim()

                if (!nestedTrimmed) {
                  continue
                }

                if (!/^\s+/.test(rawNestedLine)) {
                  break
                }

                const normalizedNested = nestedTrimmed.replace(/^[*-]\s*/, '').trim()
                if (!normalizedNested) {
                  continue
                }

                if (isDelegationFieldHeader(normalizedNested)) {
                  break
                }

                if (valueEvaluator(normalizedNested)) {
                  return true
                }
              }

              return false
            }
            const collectDelegationFieldValues = (lines, fieldPattern) => {
              const values = []

              for (let startIndex = 0; startIndex < lines.length; startIndex += 1) {
                const line = lines[startIndex]
                const normalized = line.trim().replace(/^[*-]\s*/, '').trim()
                if (!normalized) {
                  continue
                }

                const headerMatch = normalized.match(fieldPattern)
                if (!headerMatch) {
                  continue
                }

                const directValue =
                  headerMatch[2] !== undefined
                    ? headerMatch[2].trim()
                    : headerMatch[1]?.trim()
                if (directValue) {
                  values.push(directValue)
                }

                for (let nestedIndex = startIndex + 1; nestedIndex < lines.length; nestedIndex += 1) {
                  const rawNestedLine = lines[nestedIndex]
                  const nestedTrimmed = rawNestedLine.trim()

                  if (!nestedTrimmed) {
                    continue
                  }

                  if (!/^\s+/.test(rawNestedLine)) {
                    break
                  }

                  const normalizedNested = nestedTrimmed.replace(/^[*-]\s*/, '').trim()
                  if (!normalizedNested) {
                    continue
                  }

                  if (isDelegationFieldHeader(normalizedNested)) {
                    break
                  }

                  values.push(normalizedNested)
                }
              }

              return values
            }
            const isSectionFieldHeader = (line, fieldPattern) => fieldPattern.test(line)
            const hasMeaningfulSectionFieldValue = (lines, startIndex, fieldPattern) => {
              const line = lines[startIndex]
              const normalized = line.trim().replace(/^[*-]\s*/, '').trim()
              if (!normalized) {
                return false
              }

              const headerMatch = normalized.match(fieldPattern)
              if (!headerMatch) {
                return false
              }

              const value =
                headerMatch[2] !== undefined
                  ? headerMatch[2].trim()
                  : headerMatch[1]?.trim()
              if (hasMeaningfulValue(value)) {
                return true
              }

              for (let nestedIndex = startIndex + 1; nestedIndex < lines.length; nestedIndex += 1) {
                const rawNestedLine = lines[nestedIndex]
                const nestedTrimmed = rawNestedLine.trim()

                if (!nestedTrimmed) {
                  continue
                }

                if (!/^\s+/.test(rawNestedLine)) {
                  break
                }

                const normalizedNested = nestedTrimmed.replace(/^[*-]\s*/, '').trim()
                if (!normalizedNested) {
                  continue
                }

                if (isSectionFieldHeader(normalizedNested, fieldPattern)) {
                  break
                }

                if (hasMeaningfulValue(normalizedNested)) {
                  return true
                }
              }

              return false
            }
            const collectSectionFieldValues = (lines, fieldPattern) => {
              const values = []

              for (let startIndex = 0; startIndex < lines.length; startIndex += 1) {
                const line = lines[startIndex]
                const normalized = line.trim().replace(/^[*-]\s*/, '').trim()
                if (!normalized) {
                  continue
                }

                const headerMatch = normalized.match(fieldPattern)
                if (!headerMatch) {
                  continue
                }

                const directValue =
                  headerMatch[2] !== undefined
                    ? headerMatch[2].trim()
                    : headerMatch[1]?.trim()
                if (directValue) {
                  values.push(directValue)
                }

                for (let nestedIndex = startIndex + 1; nestedIndex < lines.length; nestedIndex += 1) {
                  const rawNestedLine = lines[nestedIndex]
                  const nestedTrimmed = rawNestedLine.trim()

                  if (!nestedTrimmed) {
                    continue
                  }

                  if (!/^\s+/.test(rawNestedLine)) {
                    break
                  }

                  const normalizedNested = nestedTrimmed.replace(/^[*-]\s*/, '').trim()
                  if (!normalizedNested) {
                    continue
                  }

                  if (isSectionFieldHeader(normalizedNested, fieldPattern)) {
                    break
                  }

                  values.push(normalizedNested)
                }
              }

              return values
            }
            const hasMeaningfulSectionContent = (section, fieldPattern) => {
              const lines = section.split('\n')
              const hasKnownField = lines.some((line) =>
                fieldPattern.test(line.trim().replace(/^[*-]\s*/, '').trim()),
              )

              if (hasKnownField) {
                return lines.some((line, index) =>
                  hasMeaningfulSectionFieldValue(lines, index, fieldPattern),
                )
              }

              return lines
                .map((line) => line.trim().replace(/^[*-]\s*/, '').trim())
                .some((line) => hasMeaningfulValue(line))
            }
            const delegationExecutionLogLines = delegationExecutionLogSection.split('\n')
            const hasDelegationExecutionLog = delegationExecutionLogLines.some((line, index) =>
              hasMeaningfulDelegationValue(delegationExecutionLogLines, index, delegationFieldPattern),
            )
            const hasWorkerSessionCloseout = delegationExecutionLogLines.some((line, index) =>
              hasMeaningfulDelegationValue(delegationExecutionLogLines, index, closeoutFieldPattern),
            )
            const spawnDirectives = collectDelegationFieldValues(
              delegationExecutionLogLines,
              spawnDirectiveFieldPattern,
            )
            const workerProfiles = [
              'controller',
              'ops_spark',
              'repo_scout',
              'docs_worker',
              'test_worker',
              'backend_worker',
              'frontend_worker',
              'schema_worker',
              'review_worker',
            ]
            const hasWorkerProfileInValue = (value) =>
              workerProfiles.some((profile) =>
                new RegExp(`(?:^|[^A-Za-z0-9_])${profile}(?:$|[^A-Za-z0-9_])`, 'i').test(value || ''),
              )
            const hasActualWorkerProfile = delegationExecutionLogLines.some((line, index) =>
              hasMeaningfulDelegationValue(delegationExecutionLogLines, index, actualWorkerProfileFieldPattern, hasWorkerProfileInValue),
            )
            const hasAutonomousBranchSignal =
              /(?:^|[/-])(?:autonomous|codex)(?:[/-]|$)/i.test(pr.head?.ref || '')
            const hasAutonomousBodySignal =
              /(?:^|\n)\s*-?\s*(?:Autonomous PR|Codex workflow)\s*[：:]\s*(?:yes|true|enabled)/i.test(bodyForAutonomousGate)
            const isAutonomousPr =
              labels.some((label) => autonomousLabels.has(label)) ||
              hasAutonomousBranchSignal ||
              hasAutonomousBodySignal ||
              hasDelegationExecutionLog
            const hasTrivialExceptionReason = trivialExceptionFieldPatterns.some((fieldPattern) =>
              delegationExecutionLogLines.some((line, index) =>
                hasMeaningfulDelegationValue(delegationExecutionLogLines, index, fieldPattern.pattern, fieldPattern.valueEvaluator),
              ),
            )
            const hasReviewConversationCloseout = hasMeaningfulSectionContent(
              reviewConversationCloseoutSection,
              reviewCloseoutFieldPattern,
            )
            const reviewConversationCloseoutLines = reviewConversationCloseoutSection.split('\n')
            const hasAllReviewEvidenceRefs = reviewEvidenceFieldPatterns.every((fieldPattern) =>
              reviewConversationCloseoutLines.some((line, index) =>
                hasMeaningfulSectionFieldValue(reviewConversationCloseoutLines, index, fieldPattern),
              ),
            )
            const hasPendingReviewEvidenceRef = reviewEvidenceFieldPatterns.some((fieldPattern) =>
              collectSectionFieldValues(reviewConversationCloseoutLines, fieldPattern).some((value) =>
                /^pending\b/i.test(value),
              ),
            )
            const hasBarePendingReviewEvidenceRef = reviewEvidenceFieldPatterns.some((fieldPattern) =>
              collectSectionFieldValues(reviewConversationCloseoutLines, fieldPattern).some((value) =>
                /^pending$/i.test(value),
              ),
            )
            const hasValidReviewEvidenceRefs =
              hasReviewConversationCloseout && hasAllReviewEvidenceRefs && !hasBarePendingReviewEvidenceRef
            const finalMergeGateLines = finalMergeGateSection.split('\n')
            const hasFinalMergeGate = hasMeaningfulSectionContent(
              finalMergeGateSection,
              finalMergeGateFieldPattern,
            )
            const hasCompleteSpawnDirective = (directive) =>
              /\bprofile=\S+/i.test(directive) &&
              /\bmodel=\S+/i.test(directive) &&
              /\breasoning=\S+/i.test(directive) &&
              /\bcontroller_fallback=\S+/i.test(directive)
            const hasControllerFallbackReason = (directive) =>
              /\b(?:fallback_reason|controller_fallback_reason)=\S/i.test(directive)
            const allowedControllerFallbackPattern = /\bcontroller_fallback=allowed\b/i
            const usesHighEndControllerModelForOpsSpark = (directive) =>
              /\bprofile=ops_spark\b/i.test(directive) &&
              /\bmodel=(?:controller|gpt-5\.5|gpt-5\.5-[^\s]+)/i.test(directive)
            const readyToMergeValues = collectSectionFieldValues(
              finalMergeGateLines,
              readyToMergeFieldPattern,
            )
            const hasBarePendingMergeGate = readyToMergeValues.some((value) => /^pending$/i.test(value))
            const hasReadyToMergeDecision = readyToMergeValues.some((value) => /^ready\b/i.test(value))
            const reviewEvidenceRefsPass =
              hasValidReviewEvidenceRefs && !(hasReadyToMergeDecision && hasPendingReviewEvidenceRef)
            const hasValidSpawnDirective = spawnDirectives.some(hasCompleteSpawnDirective)
            const hasInvalidAllowedFallbackDirective = spawnDirectives.some(
              (directive) =>
                allowedControllerFallbackPattern.test(directive) && !hasControllerFallbackReason(directive),
            )
            const hasOpsSparkControllerWithoutFallbackReason = spawnDirectives.some(
              (directive) =>
                usesHighEndControllerModelForOpsSpark(directive) && !hasControllerFallbackReason(directive),
            )

            const hardMaxChangedFiles = 35
            const hardMaxDiffLines = 1000
            const warningDiffLines = 600
            const autoCloseLabel = 'scope-violation'
            const dependencyLabel = 'blocked-by-dependency'
            const owner = context.repo.owner
            const repo = context.repo.repo

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            })

            const filenames = files.map((file) => file.filename)
            const allFilePaths = files.flatMap((f) =>
              f.status === 'renamed' && f.previous_filename ? [f.filename, f.previous_filename] : [f.filename]
            )
            const diffLines = files.reduce((sum, file) => sum + file.additions + file.deletions, 0)
            const isDocsOrTemplatePath = (name) =>
              name.startsWith('docs/') ||
              name.startsWith('docs/ai/') ||
              name.startsWith('plans/') ||
              name.startsWith('.github/ISSUE_TEMPLATE/') ||
              name === '.github/PULL_REQUEST_TEMPLATE.md' ||
              /^[^/]+\.md$/i.test(name)
            const isNonProductMetadataPath = (name) =>
              isDocsOrTemplatePath(name) ||
              name.startsWith('infra/') ||
              name === '.gitignore' ||
              name === '.gitattributes'
            const isDocsTemplateOrMetadataOnly =
              allFilePaths.length > 0 && allFilePaths.every(isNonProductMetadataPath)

            const touches = {
              backend: allFilePaths.some((name) =>
                name.startsWith('backend/') || name.startsWith('services/api/'),
              ),
              frontend: allFilePaths.some((name) =>
                name.startsWith('dashboard/') ||
                name.startsWith('tachimint/') ||
                name.startsWith('apps/dashboard/') ||
                name.startsWith('apps/extension/'),
              ),
              contracts: allFilePaths.some((name) => name.startsWith('contracts/')),
              docs: allFilePaths.some((name) => name.startsWith('docs/') || name.startsWith('plans/')),
              packages: allFilePaths.some((name) => name.startsWith('packages/')),
            }

            const productSurfaces = Object.entries({
              backend: touches.backend,
              frontend: touches.frontend,
              contracts: touches.contracts,
            })
              .filter(([, touched]) => touched)
              .map(([name]) => name)

            const body = pr.body || ''
            const title = pr.title || ''
            const failures = []
            const policyFailures = []
            const dependencyFailures = []
            const severeFailures = []
            const warnings = []

            const allowedPrefixes = ['[backend]', '[frontend]', '[contract]', '[discussion]', '[release]', '[infra]', '[chore]']
            const titlePrefix = allowedPrefixes.find((prefix) => title.startsWith(prefix))
            const isInfraOrChore = titlePrefix === '[infra]' || titlePrefix === '[chore]'
            const hasSourceOfTruth = /(?:^|\n)\s*-?\s*Source of truth\s*[：:]/i.test(body)
            const hasExplicitNonGoals = body.includes('本 PR 明確不做')
            const dependsOnMatch = body.match(/(?:^|\n)\s*-?\s*Depends on PR\s*[：:]\s*(.+)/i)
            const dependsOnRaw = dependsOnMatch?.[1]?.trim()
            const dependsOnNone = dependsOnRaw?.toLowerCase() === 'none'
            const dependsOnPrMatch = dependsOnRaw?.match(/^#(\d+)$/)
            const backendContractYes = /Backend contract already in develop\s*[：:][\s\S]*?- \[[xX]\] yes/i.test(body)
            const backendContractNo = /Backend contract already in develop\s*[：:][\s\S]*?- \[[xX]\] no/i.test(body)
            const stackedOnDependency = /If no, this PR is:[\s\S]*?- \[[xX]\] stacked on dependency branch/i.test(body)
            const intentionallyBlocked = /If no, this PR is:[\s\S]*?- \[[xX]\] intentionally blocked until dependency merges/i.test(body)

            if (!isDependabotPr) {
              if (checkedRiskClasses.length !== 1) {
                policyFailures.push('PR body must select exactly one PR risk class (R0-R4).')
              }

              if (selectedRiskClassId === 'R4' && hasAutoReadyLabel) {
                policyFailures.push(
                  'R4 PRs cannot use `auto-ready`; remove the `auto-ready` label and require human review.',
                )
              }

              if (isAutonomousPr) {
                if (!hasDelegationExecutionLog) {
                  policyFailures.push('Autonomous PR must include a `Delegation Execution Log` section.')
                }

                if (!hasActualWorkerProfile && !hasTrivialExceptionReason) {
                  policyFailures.push(
                    'Autonomous PR must name at least one explicit worker profile or provide a trivial/self-only exception reason.',
                  )
                }

                if (hasDelegationExecutionLog && !hasWorkerSessionCloseout) {
                  policyFailures.push(
                    'Autonomous PR must include a meaningful `Worker session closeout` value (not blank / n/a / none / 無 / 不適用).',
                  )
                }

                if (!hasReviewConversationCloseout && !hasFinalMergeGate) {
                  policyFailures.push(
                    'Autonomous PR must include either `Review conversation closeout` or `Final merge gate` evidence.',
                  )
                }

                if (
                  hasReviewConversationCloseout &&
                  (!hasValidReviewEvidenceRefs || (hasReadyToMergeDecision && hasPendingReviewEvidenceRef))
                ) {
                  policyFailures.push(
                    'Autonomous PR review closeout must include `review_triage_ref`, `root_cause_gate_ref`, and `finding_disposition_ref`; ready-to-merge closeout cannot leave those refs pending.',
                  )
                }

                if (!hasTrivialExceptionReason && !hasValidSpawnDirective) {
                  policyFailures.push(
                    'Autonomous PR must include at least one spawn directive with `profile=`, `model=`, `reasoning=`, and `controller_fallback=`.',
                  )
                }

                if (hasInvalidAllowedFallbackDirective) {
                  policyFailures.push(
                    '`controller_fallback=allowed` requires a non-empty `fallback_reason=` in the same spawn directive.',
                  )
                }

                if (hasOpsSparkControllerWithoutFallbackReason) {
                  policyFailures.push(
                    'ops_spark tasks must not use a high-end controller model unless the same spawn directive records a fallback reason.',
                  )
                }

                if (hasBarePendingMergeGate) {
                  policyFailures.push(
                    'Autonomous PR final merge gate must not leave a bare `pending` ready-to-merge decision.',
                  )
                }
              }

              if (bypassed) {
                core.notice('Scope checks bypassed by scope-exception label; autonomous delegation gate still enforced.')
              }

              if (!bypassed) {
              if (!titlePrefix) {
                policyFailures.push(
                  `PR title must start with one of: ${allowedPrefixes.join(', ')}. Current title: "${title}".`,
                )
              }

              if (isReleasePromotionPr && titlePrefix !== '[release]') {
                policyFailures.push('`develop -> main` release PR must use the `[release]` title prefix.')
              }

              if (!isReleasePromotionPr && titlePrefix === '[release]') {
                policyFailures.push('`[release]` PR is reserved for formal `develop -> main` promotion PRs only.')
              }

              if (!isReleasePromotionPr && !isInfraOrChore && !/#\d+/.test(body)) {
                policyFailures.push('PR body must reference at least one issue or PR number such as `#123`.')
              }

              if (!isInfraOrChore && !hasSourceOfTruth) {
                policyFailures.push('PR body must include a `Source of truth` line in the Scope 對齊 section.')
              }

              if (!isInfraOrChore && !hasExplicitNonGoals) {
                policyFailures.push('PR body must include a `本 PR 明確不做` section.')
              }

              if (!isInfraOrChore && !dependsOnRaw) {
                policyFailures.push('PR body must include a `Depends on PR` line with `none` or `#123`.')
              }

              if (!isInfraOrChore && dependsOnRaw && !dependsOnNone && !dependsOnPrMatch) {
                policyFailures.push('`Depends on PR` must be `none` or a single PR number such as `#123`.')
              }

              if (!isInfraOrChore && !isDocsTemplateOrMetadataOnly) {
                if (!backendContractYes && !backendContractNo) {
                  policyFailures.push('PR body must mark whether the backend contract is already in `develop`.')
                }
                if (backendContractYes && backendContractNo) {
                  policyFailures.push('`Backend contract already in develop` cannot select both yes and no.')
                }
                if (isReleasePromotionPr && !backendContractYes) {
                  policyFailures.push('Formal `[release]` PR must mark `Backend contract already in develop` as yes.')
                }

                if (backendContractNo && !stackedOnDependency && !intentionallyBlocked) {
                  policyFailures.push(
                    'When backend contract is not yet in `develop`, PR body must mark this PR as stacked or intentionally blocked.',
                  )
                }
              }
              }
            }

            if (!bypassed && titlePrefix === '[frontend]' && dependsOnPrMatch && backendContractNo) {
              const depNumber = parseInt(dependsOnPrMatch[1], 10)
              let depState = 'unknown'
              try {
                const depPr = await github.rest.pulls.get({ owner, repo, pull_number: depNumber })
                depState = depPr.data.state
              } catch (error) {
                if (error.status !== 404) throw error
              }

              const message = stackedOnDependency
                ? `This frontend PR depends on #${depNumber}, but the backend contract is not yet in develop. Keep it stacked on the dependency branch and do not merge until #${depNumber} lands. Dependency PR state: ${depState}.`
                : `This frontend PR depends on #${depNumber}, but the backend contract is not yet in develop. Wait for #${depNumber} to merge, then re-stack from latest develop. Dependency PR state: ${depState}.`
              dependencyFailures.push(message)
            }

            if (!isDependabotPr && !bypassed) {
              if (!isReleasePromotionPr && filenames.length > hardMaxChangedFiles) {
                const message =
                  `PR changes ${filenames.length} files, which exceeds the hard limit of ${hardMaxChangedFiles}. Split the PR before review.`
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && diffLines > warningDiffLines && diffLines <= hardMaxDiffLines) {
                const message =
                  `PR diff size is ${diffLines} lines (+/-), which exceeds the soft limit of ${warningDiffLines}. Consider splitting this PR for easier review.`
                warnings.push(message)
              }

              if (!isReleasePromotionPr && diffLines > hardMaxDiffLines) {
                const message =
                  `PR diff size is ${diffLines} lines (+/-), which exceeds the hard limit of ${hardMaxDiffLines}. Split the PR before review. (Use \`scope-exception\` label only for maintainer-approved changes that truly cannot be split; it bypasses general scope / size / product-surface checks, not the autonomous delegation gate.)`
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && productSurfaces.length > 1) {
                const message =
                  `PR touches multiple product surfaces (${productSurfaces.join(', ')}). Keep one PR to one surface only.`
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && titlePrefix === '[backend]' && touches.frontend) {
                const message = '[backend] PR must not change frontend surfaces such as dashboard/, tachimint/, apps/dashboard/, or apps/extension/.'
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && titlePrefix === '[frontend]' && touches.backend) {
                const message =
                  '[frontend] PR must not change backend/service API files. Move backend prerequisites into a separate PR.'
                failures.push(message)
                severeFailures.push(message)
              }

              if (!isReleasePromotionPr && titlePrefix === '[contract]' && (touches.backend || touches.frontend)) {
                const message = '[contract] PR must not change backend/service API or frontend surfaces.'
                failures.push(message)
                severeFailures.push(message)
              }
            }

            if (!bypassed && titlePrefix === '[discussion]' && productSurfaces.length > 0) {
              warnings.push(
                '[discussion] PR is changing product code. Consider moving implementation work to a feature PR.',
              )
            }

            failures.push(...policyFailures, ...dependencyFailures)

            const commentHeader = '<!-- pr-scope-police -->'
            const summaryLines = [
              commentHeader,
              '## PR Scope Police',
              '',
            ]

            if (failures.length === 0) {
              summaryLines.push('- PASS: scope checks passed.')
            } else {
              summaryLines.push('- FAIL: this PR is blocked by policy, dependency, or scope issues.')

              if (policyFailures.length > 0) {
                summaryLines.push('')
                summaryLines.push('### Policy issues')
                for (const failure of policyFailures) {
                  summaryLines.push(`- ${failure}`)
                }
              }

              if (dependencyFailures.length > 0) {
                summaryLines.push('')
                summaryLines.push('### Dependency blocks')
                for (const failure of dependencyFailures) {
                  summaryLines.push(`- ${failure}`)
                }
              }

              if (failures.length > policyFailures.length + dependencyFailures.length) {
                summaryLines.push('')
                summaryLines.push('### Scope violations')
                for (const failure of severeFailures) {
                  summaryLines.push(`- ${failure}`)
                }
              }
            }

            if (warnings.length > 0) {
              summaryLines.push('')
              summaryLines.push('### Warnings')
              for (const warning of warnings) {
                summaryLines.push(`- ${warning}`)
              }
            }

            if (isDependabotPr) {
              summaryLines.push('')
              summaryLines.push('### Dependabot Mode')
              summaryLines.push('- Template policy checks are skipped for Dependabot maintenance PRs.')
              summaryLines.push('- Scope and size checks still apply.')
              summaryLines.push('- Dependency gate is not evaluated for Dependabot PRs.')
            }

            if (isDocsTemplateOrMetadataOnly && !isDependabotPr) {
              summaryLines.push('')
              summaryLines.push('### Docs / Template Mode')
              summaryLines.push('- Backend contract checks are skipped for non-product docs/template/metadata PRs.')
              summaryLines.push('- Title prefix, source of truth, dependency line, explicit non-goals, size, and surface checks still apply.')
            }

            if (isAutonomousPr) {
              summaryLines.push('')
              summaryLines.push('### Autonomous evidence snapshot')
              summaryLines.push(`- Delegation log: ${hasDelegationExecutionLog ? 'pass' : 'fail'}`)
              summaryLines.push(
                `- Worker session closeout: ${hasWorkerSessionCloseout ? 'pass' : 'fail'}`,
              )
              summaryLines.push(
                `- Spawn directives: ${
                  hasTrivialExceptionReason || hasValidSpawnDirective ? 'pass' : 'fail'
                }`,
              )
              summaryLines.push(
                `- Controller fallback detail: ${
                  hasInvalidAllowedFallbackDirective || hasOpsSparkControllerWithoutFallbackReason
                    ? 'fail'
                    : 'pass'
                }`,
              )
              summaryLines.push(
                `- Review closeout: ${hasReviewConversationCloseout ? 'pass' : 'fail'}`,
              )
              summaryLines.push(
                `- Review evidence refs: ${
                  hasReviewConversationCloseout ? (reviewEvidenceRefsPass ? 'pass' : 'fail') : 'n/a'
                }`,
              )
              summaryLines.push(`- Final merge gate: ${hasFinalMergeGate ? 'pass' : 'fail'}`)
              summaryLines.push(
                `- Ready-to-merge pending cleared: ${hasBarePendingMergeGate ? 'fail' : 'pass'}`,
              )
            }

            summaryLines.push('')
            summaryLines.push('### Snapshot')
            summaryLines.push(`- Mode: ${isReleasePromotionPr ? 'release promotion (develop -> main)' : 'standard PR'}`)
            summaryLines.push(`- Docs/template/metadata only: ${isDocsTemplateOrMetadataOnly ? 'yes' : 'no'}`)
            summaryLines.push(`- Changed files: ${filenames.length}`)
            summaryLines.push(`- Diff lines (+/-): ${diffLines}`)
            summaryLines.push(
              `- Product surfaces: ${productSurfaces.length > 0 ? productSurfaces.join(', ') : 'none'}`,
            )
            summaryLines.push(`- PR risk class: ${selectedRiskClassId}`)
            summaryLines.push(`- Auto-ready allowed by risk class: ${autoReadyAllowedByRiskClass ? 'yes' : 'no'}`)
            summaryLines.push(`- Dependency blocked: ${dependencyFailures.length > 0 ? 'yes' : 'no'}`)
            summaryLines.push(`- Autonomous PR: ${isAutonomousPr ? 'yes' : 'no'}`)
            summaryLines.push(
              `- Auto-close triggered: ${severeFailures.length > 0 ? 'yes' : 'no'}`,
            )
            summaryLines.push(`- Auto-close label: \`${autoCloseLabel}\``)
            summaryLines.push(`- Dependency block label: \`${dependencyLabel}\``)
            summaryLines.push('- Bypass label: `scope-exception`')

            const commentBody = summaryLines.join('\n')

            const existingComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            })

            const previous = existingComments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(commentHeader),
            )

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body: commentBody,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: commentBody,
              })
            }

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name })
              } catch (error) {
                if (error.status !== 404) throw error
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                })
              }
            }

            if (severeFailures.length > 0) {
              await ensureLabel(
                autoCloseLabel,
                'B60205',
                'PR was blocked by automated scope policy checks',
              )
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: [autoCloseLabel],
              })

              if (pr.state === 'open') {
                const closeReason = severeFailures.map(f => `- ${f}`).join('\n')
                const closeComment = `🚨 **Closed by scope police**\n\nThis PR has been automatically closed due to scope violations:\n\n${closeReason}\n\nPlease see the scope police comment above and [CLAUDE.md](https://github.com/${owner}/${repo}/blob/develop/CLAUDE.md) for details. Feel free to reopen once issues are resolved.`

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: closeComment,
                })

                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pr.number,
                  state: 'closed',
                })
                core.notice('PR was auto-closed due to severe scope violations.')
              }
            } else if (labels.includes(autoCloseLabel)) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pr.number,
                  name: autoCloseLabel,
                })
              } catch (error) {
                if (error.status !== 404) throw error
              }
            }

            if (dependencyFailures.length > 0) {
              await ensureLabel(
                dependencyLabel,
                '1D76DB',
                'PR is blocked by an unmerged dependency or undeployed backend contract',
              )
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: [dependencyLabel],
              })
            } else if (labels.includes(dependencyLabel)) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pr.number,
                  name: dependencyLabel,
                })
              } catch (error) {
                if (error.status !== 404) throw error
              }
            }

            if (failures.length > 0) {
              core.setFailed('PR Scope Police blocked this PR. See sticky comment for details.')
            } else {
              core.notice('PR scope police passed.')
            }
