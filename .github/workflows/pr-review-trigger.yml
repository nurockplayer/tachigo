name: Trigger NAS PR Review

on:
  pull_request:
    types: [synchronize]
    branches: [main, develop]

permissions:
  pull-requests: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check for CHANGES_REQUESTED and notify NAS
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            })
            const hasCR = reviews.some(r =>
              r.user?.login === 'nurockplayer' && r.state === 'CHANGES_REQUESTED'
            )
            if (!hasCR) { core.info('No CHANGES_REQUESTED — skipping'); return }

            const res = await fetch(`${process.env.NAS_WEBHOOK_URL}/review`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-webhook-secret': process.env.NAS_WEBHOOK_SECRET,
              },
              body: JSON.stringify({ pr: context.payload.pull_request.number }),
            })
            core.info(`NAS responded: ${res.status}`)
        env:
          NAS_WEBHOOK_URL: ${{ secrets.NAS_WEBHOOK_URL }}
          NAS_WEBHOOK_SECRET: ${{ secrets.NAS_WEBHOOK_SECRET }}
