version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    target-branch: develop
    labels:
      - chore

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    target-branch: develop
    labels:
      - chore
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint*"
          - "@eslint/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /tachimint
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    target-branch: develop
    labels:
      - chore
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint*"
          - "@eslint/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      deps:
        patterns:
          - "*"
